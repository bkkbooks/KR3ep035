body:
  text: 卷三瘧疾瘧母因不慎食物腹鳴痞脹溏泄以理脾胃之陽藥草果仁吳茱萸茅朮厚朴廣皮椒目老薑搗取汁泛為丸舌白不渴脈沉腹滿不飢不食二便不通是暑濕發瘧後中氣不復驟食大葷亦氣結成脹大針砂丸一錢二分十服脈左數搏是先天真陰難充則生內熱瘧熱再傷其陰與滋養甘藥填陰左歸丸去杞子牛膝加天冬女貞三瘧乃邪伏陰分而發數月始止然畏風怕冷因瘧邪偏寒偏熱已久營衛皆弱氣薄不固調養失宜必致復病議用大封大固如天真丸天真丸去羊肉加河車膠向來多咳肺傷六月草四風潮感邪單熱不寒為疸瘧仲景謂消爍肌肉當以飲食消息之在乎救胃陰以供肺也醫知是理否大竹葉連翹麥冬生甘草青甘蔗漿甜秋梨漿伏暑因新涼發瘧頭脹噁心脘痞邪郁上焦從肺瘧治竹葉連翹滑石杏仁川貝橘紅白蔻紫厚朴太陰濕瘧脾陽傷氣不運舌白脘悶水飲停蓄當理氣分草果厚朴藿梗廣皮杏仁苓皮化蘇合丸一丸濕熱未清瘧止頭目胸中不爽不飢不思食病在氣分草果白蔻厚朴廣皮茯苓杏仁疸瘧兩旬不解舌白脘悶色奪菖蒲根汁白蔻仁草果厚朴杏仁茯苓皮廣皮化牛黃丸一丸一去杏蔻加木香藿香化入蘇合丸接服竹葉地黃湯法間日瘧不飢心悶不甚渴從脾胃制邪可愈草果知母黃芩生薑厚朴半夏廣皮風濕著太陰瘧草果厚朴廣皮茯苓豬苓藿香梗化蘇合香丸農家夏季受冷濕之氣陽氣不司宣暢壯年形軟無力乃勞倦傷之瘧生白朮生薑草果厚朴廣皮藿香此熱傷氣分而為疸瘧寐則肢腫熱渴余暑尚熾宜救胃津人參麥冬竹葉知母生甘草瘧止反覆必有所因姑就色脈氣怯神弱因病致虛夏秋宜調中益氣人參益智茯苓廣皮炙甘草炒白芍今年瘧疾半由雨濕陰晦之邪當以芳香逐穢理氣分多效但三瘧系在陰伏起必左足微冷熱過有汗仍知飢知味乃勞乏氣怯之病不必專以攻邪是歲系濕土司天桂枝木生牡蠣炒黑蜀漆生耆當歸防風根生薑大棗接案寒在四肢熱起額准至腹此太陰三瘧也經水來期不移脾主營前議和血托邪服後瘧來熱多口渴此太陰陽明兩病草果仁知母細桂枝尖黃芩生薑烏梅肉勞倦傷陽不復新涼再受為瘧質虛感邪不可發散桂枝生術防己茯苓皮藿梗廣皮三年前失血今秋途次暑濕熱傷成瘧脘痞不飢是邪結氣分飛滑石白蔻仁杏仁厚朴藿香梗廣皮木香今年瘧痢皆水土濕鬱之氣傷及脾陽不司轉旋令人中痞不食辛香理氣驅濕蔬易安濕土司天生草果厚朴桂枝茯苓藿梗廣皮瘧數月三日一發邪伏於陰不忌葷酒致脅腹有形邪與氣血膠固結為瘧母癥瘕鱉甲煎丸每服三十丸瘧傷陰氣復脈去參薑桂瘧熱傷陰不復乾咳汗出桑葉玉竹炒川貝母大沙參麥冬生草南花粉少陰瘧誤治延及太陰腹有動氣近暴冷寒熱甚淡附子川桂枝北細辛炙甘草生薑南棗寒自背起熱不煩渴不飢不思食指臂麻木脈來小弱近受溫邪如瘧其實陽氣久虛當從本病調折川桂枝茯苓炙草煨姜南棗生益智仁背寒肩胛拘束陽微瘧根人參附子桂枝木炙甘草生薑南棗生於術生益智仁接案形寒拘束已止身痛食少生黃耆歸身人參南棗淡附子蒸冬朮廣皮炙甘草又照前方去淡附子加穀芽煨姜熱後寒寒後熱此兩陽遇於一陰如易之離象中宮必虛大忌散發攻食間日而作瘧勢未罷仍該和解鮮荷梗白蔻仁黃芩鬱金烏梅肉生白芍夏秋所伏暑濕至霜降節乃發是新邪引動宿邪初病頭痛汗出寒熱勢猛是新邪鋒芒易解繼而勢似差緩瘧來兩日越一日再發半月竟成三瘧發於子午地支為太陰蓋邪氣久伏六淫客氣皆從火化然中年形體豐偉已見脈弱神倦外似有餘里真不足凡寒熱之邪必由四末漸攻中焦病來心中熱躁渴飲胸悶不知飢知味寒則肢背拘束熱甚心腹最劇由邪聚為重邪分稍緩此為里中之表病在絡不能汗解下奪惟辛香宣通以氤氳氛瘴原非質滯阻清陽流行之隧日加蒙痹致正氣日疲故深秋入冬伏邪在陰發瘧不與時瘧和解清熱同例方缺寒熱過後從太陰動瘧紫厚朴茯苓皮川桂枝草果仁大防己天花粉先有遺精陰虛瘧邪墜入陰絡是少陰瘧非治瘧通套柴苓可效素有遺精瘧來而遺止陰中之陽既因邪得深入留連述寒熱起由足跗廉陽維失護少陰內怯不得以表裡混治人參歸身炙草鹿茸桂木生牡蠣陰瘧上部先寒年十三未出是營衛疏客邪留著色黃脈小歸耆建中去餳糖久瘧營衛皆虛血空氣疏頭暈心悸無以主張先與甘緩益虛生黃耆茯神炙草歸身米仁桂圓瘧母遇勞而發顯然陽傷絡窒阿魏丸今年患瘧最多皆因大地濕邪濕傷陽氣不旋肛墜痔血小便不利宜旋轉太陽之氣五苓散瘧邪傷陰陽升不藏衄血夜汗六味去丹澤加五味女貞附方補中益氣湯加首烏薑棗又首烏一兩白朮五錢又生於術龍骨煨姜桂枝木牡蠣南棗濕瘧失治瘡疥腹脹形寒減食都是脾胃受傷勿強進腥濁厚味胃苓去甘草接案昨服胃苓湯糞後有血小溲不利久伏濕邪三焦皆受郁久成熱用分消法茯苓皮山茵陳木防己紫厚朴槐花細本通海金沙萆薢此厥陰瘧症之最重者煩躁吐蛔脈弦數可徵擬苦辛酸法川連川椒桂枝乾薑烏梅白芍瘧三日一發是邪伏在陰經經年雖止正傷難復仲景鱉甲煎丸專以升降宣瘀治肝謂寒熱不離少陽久必入肝肝主血左脅為肝募俞也故病固當如是但久有遺精食少不化諸恙病非一端此攻邪溫補未能卻病莫若養正氣旺邪自除古有諸矣午服妙香散三日瘧是邪伏陰分而發非和解可效久瘧不止補劑必以升陽引伏邪至陽分則愈守補藥則非人參鹿茸當歸茯苓附子鹿角霜杞子沙苑熱病繼瘧交冬自止左脅已結瘧母今食物難化大便溏泄神疲力倦病由葷酒太早致濕聚氣阻治以疏補脾胃茵陳四苓加厚朴益智仁夏暑濕熱診脈緩軟澀胃脘不爽欲噯夜來腹脹吐痰酸水口鼻吸冷損及中陽暫用冷香飲子方宜緩進參朮藿梗草果仁附子廣皮厚朴茯苓脈沉緩目黃舌白嘔惡脘腹悶脹此冷暖不和水穀之氣釀濕太陰脾陽不運周行氣遂為阻法當辛香溫脾宣氣逐濕用冷香飲子草果藿梗半夏茯苓皮厚朴廣皮杏仁茵陳舌白黃不飢筋骨甚軟自暑濕內蒸脾胃受傷陽明胃脈不司分布流行若不早治必延瘧痢白蔻杏仁藿梗木通滑石厚朴廣皮桔梗春夏地氣上升身處山麓亦有瘴氣混於水土之中飲食不覺脾胃氣困頻年長夏舌黃腹脹便祕成瀉皆濕阻清濁不分兩年治效多以分消每交春深山行蔬食俾氣清流暢則無是病生白朮米仁廣皮苓皮厚朴生智仁桔梗金石斛汁法丸又煎方草果廣皮腹皮豬苓厚朴苓皮萊蔔子澤瀉失藏人身應之患此者最多考古人溫病忌表散誤投則劫津逆傳心胞最怕神昏譫妄治法以辛甘涼潤為主蓋傷寒入足經溫邪入手經也上潤則肺降不致膹郁胃熱下移知飢渴解矣嫩竹葉麥冬桑葉蔗漿石膏白糖拌炒生草杏仁冬溫伏邪先厥後熱深熱從里而發汗出煩渴當救胃汁竹葉心麥冬生穀芽烏梅肉生草川石斛風溫咳嗽下焦陰虛先以辛甘涼劑清上桑葉大沙參麥冬玉竹川貝生草糯米泡湯煎冬月溫邪內伏入春寒熱咳嗽身痛微汗乃解與溫瘧同法桂枝白虎湯咳嗽二年形瘦谷減冬季喉垂漸痛可見水虧陽氣不藏春月氣日甚皆陰乏上承陽結於上為喉痹矣近日寒熱風溫客氣脈小數為陰傷忌用辛散桑葉沙參川貝玉竹麥冬生草風溫變熱爍筋灼骨足筋腫痛而熱二便不通夜躁不眠邪已入厥陰多驚駭面青經水不應期而來為腳氣之症漢防己川黃柏川萆薢晚蠶沙海金沙川通草五錢煎湯代水鮮生地阿膠五味牡蠣麥冬白芍女貞脈數右實左弦服養陰藥已得效但未能愈耳嘈雜恍惚胸上動氣苦寒清熱用小柴胡湯治陽維之會桑葉經霜赤丹皮鮮生地鮮桑葉阿膠女貞生白芍白丹皮溫邪感觸氣從口鼻直走膜原中道不同傷寒陽症邪自太陽次第傳經蓋春溫夏熱鼻受氣則肺受病口入之氣竟由脘中致以手經見症不似傷寒足六經病也仲景論溫不可發汗汗則劫津傷陽身必灼熱一逆尚引日再逆促命期又云鼻息鼾語言難劇則驚癇瘛瘲無非重劫陰陽而然今病發熱原不是太陽客邪見症所投羌防辛溫表汗此即為逆矣上竅不納下竅不便亦屬常事必以攻下希圖泄熱殊不知強汗劫精而傷陽妄下劫液而亡陰頃診脈兩手如搐而戰舌乾燥而無苔嘴前干板目欲瞑口欲開周身斑紋隱躍時有厄逆因胃乏穀氣而中空肝陽衝突上冒肆虐耳為今迫正先用糜粥使胃中得濡厥陽不致上冒而神昏之纍可已進藥之理甘溫可以生津除熱即斑疹亦不必慮觀仲景論中邪少虛多陰液陽津並涸者復脈湯主之今仿此意炙草生地阿膠人參麥冬白芍溫邪有升無降經腑氣機交逆營衛失其常度為寒熱胃津日耗渴飲不飢陽氣獨行則頭痛面赤是皆冬春驟暖天地陰虛溫熱衛泄營熱久延不已最為棘手擬從心營肺衛治之鮮生地金銀花桑葉小麥鬱金犀角尖淡黃芩伏熱久郁營衛失調汗泄心嘈皆是內蒸氣弱肢足稍露則臍下便痛正劉氏謂亢則害乘乃制之義鮮生地犀角青蒿梗生石膏地骨皮知母汗多氣泄心包伏熱五心焦煩形體反惡外寒投清寒之品熱勢稍減但熱蘊於裡必得水升火降方能陰陽和快犀角尖浮小麥鮮石菖蒲鮮生地元參心硃砂染麥冬客冬感寒入春化溫寒熱藥不中竅致令汗泄正虛因循難愈議進咸鎮一法桑葉阿膠茯神生白芍牡蠣炙草日久寒熱正虛無以主持頻頻汗泄亟宜固陽攝陰生鱉甲桑葉阿膠生耆皮生白芍枯芩茯神炙草脈數上出魚際一寸心中熱與背相控鮮生地阿膠麥冬九孔石決明生白芍女貞子五味雞子黃脈數上出魚際一寸是謂溢脈陰氣不能上承於陽也寒熱汗出身半以上是亦陽失陰守非壽徵也議攝陰救陽春溫過飲酒熱上熾肺衛心營受迫旬日間有寒熱痰飲阻氣咳逆胸痞乃內因致病薄滋味以清肅氣分蘆根枇杷葉桑葉米仁浙苓煎好加入生石膏末再煎溫邪蒸灼津液釀為熱痰胃口不得清肅不飢不食只宜甘涼生津峻利不可再投麥冬蔗漿花粉嘉定川貝桑葉大沙參津涸風動肢強口噤溫邪內陷危篤以甘緩生津熄風望其出音炙草麥冬阿膠火麻仁細生地蔗漿代水煎高年左癱近加風溫寒熱主客皆病防其昏痙厚朴廣皮豆蔻杏仁木通苓皮溫邪入肺不解遂逆傳膻中煩熱昏躁嗆出血沫猶然氣喘不食夫肺主氣心主血辨症分經最為要旨淡竹葉阿膠桔黃芩六一散病邪已去虛熱未除生地玉竹水梨生草麥冬丹皮花粉熱邪久伏風寒外侵春溫氣機不藏內蓄之邪復彰咳嗽咽痛兩足畏冷擬辛涼輕劑制其潛伏之邪熱桑葉南沙參鬱金黑山梔杏仁菊花桔梗生草牙齒常紫膝蓋痠痛上年秋季為甚此濕邪阻於經絡陽明之氣不司束筋利機議宣通脈絡之壅使氣血和平金毛脊白蒺藜生白朮油松節生米仁木防己過飲晨瀉中宮留濕乾嘔腹痛是脾不和陽氣不主運行於四末故四肢無力困頓矣宜忌濕肉使清陽轉旋中宮得健草果厚朴藿香廣皮茯苓半夏新沐頭痛鼻塞狀似風溫次日寒戰大熱脅肋痛不可轉側自利稀水乃濕聚於經脈病在氣分熱渴欲飲水今目黃上視手肢發痙舌苔白齒板燥胸中隱隱痛皆邪深痙變凶木防己桂枝木大豆黃卷茯皮天花粉菖蒲汁用木防己湯痙厥已緩經脈鬱伏濕邪已解胃汁大傷痰嗽氣閃與甘藥不傷胃氣甘蔗漿南花粉薏苡仁炒黃川貝麥冬夏季水土之濕口鼻受氣著於脾胃潮熱汗出稍涼少頃又熱病名濕溫醫但知發散清熱消導不知濕鬱不由汗解舌白不飢泄瀉滑石白蔻仁茯苓皮豬苓通草厚朴澤瀉冷熱濕穢雜感太陰經受邪草果桂枝茵陳藿梗厚朴防己茯皮廣皮濕鬱氣阻疹發飛滑石茯苓皮射干木防己茵陳檳榔摩汁今年天運寒水地氣濕土春夏雨濕泛潮鬱勃穢濁之氣人在氣交之中口鼻觸受直走胃絡募原分布上下如此症初病頭脹痞悶嘔惡必舌白病全在氣分為里中之表芳香逐穢淡滲逐痰此不為僅以陶氏全書方案競進彼寒分六經熱犯三焦不同道也且醫藥初用即瀉暑必挾濕也消之不降清之不應此濕邪乃是無形醫治卻是有形今診脈小澀舌乾口渴不能湯飲胸次軟而澀仍有嘔逆之狀當溫脾陽以運濕仍佐辛香可望其效草果桂枝木茯苓皮厚朴廣皮木防己病本濕溫元氣不能載邪外出勢有直犯神京之狀矣擬以梔豉上下分開之薑棗左右升降之芳香之草橫解之西豆豉黃芩鬱金生香附黑山梔甘草鮮菖蒲生薑舌赤頭痛噁心脈大溫邪入募原也白蔻仁桔梗枇杷葉鮮醒蘭瓜蔞皮天花粉木杏仁枳殼脈右大舌黃不渴嘔吐黏痰神躁語言不清身熱不除此勞倦內傷更感溫邪須防變痙竹葉六一散厚朴茯苓白豆蔻廣皮暑濕鬱蒸滑石飛竹葉連翹淡芩桑皮木通暑風上郁陽分晝日頭痛鼻淵鮮荷葉汁青菊葉滑石羚羊角連翹桑葉銀花暑風痰嗽目黃舌白已退遇風肌熱此肺病未和薄味不致瘧六一散川貝母栝蔞根地骨皮桑葉玉竹形瘦陰虧暑熱客氣未盡氣分有熱故不耐陰柔膩藥竹葉川貝母麥冬知母生甘草雖是伏暑濕邪平素陰虛久積勞倦病發先有夢遺此柴芍膏連苦辛皆忌鮮生地連翹心竹葉心細木通六一散金銀花舌乾黃經脈軟弱脘中不爽熱傷津液陰不上承清熱不應以甘寒生津鮮生地麥門冬柏子仁茯神人參冷沖伏暑熱燥氣分津化痰形瘦嗽未止不飢便溏米仁蘆根白蔻浙苓桔梗枇杷葉陰弱之質暑風外襲頭蒙口渴以輕劑肅之鮮絲瓜葉杏仁連翹大豆卷川通草桑皮香茹飲泄越滲利頗不宜於虛體或有人參者可以涼服暫用藥當平和清暑以雨濕已久中宮易困耳木瓜扁豆人參茯苓甘草醒頭草形瘦液少暑濕泄瀉初愈又咽乾咳嗽以暑挾濕秋熱化燥乃勝復之理玉竹麥門冬北沙參生甘草桑葉南沙參脈弱無力心中洞入夜神昏譫語面目皆紅煩渴微飲是勞倦內傷頻與苦辛消導滋陰陽愈傷則浮越有虛脫之慮議用仲景救逆法生龍骨炒黑蜀漆生左牡蠣炙甘草川桂枝木南棗肉脈弦長入尺而數舌上沾苔時或發熱大便或溏顯然素稟陰虛復受暑濕草果仁金石斛紫厚朴鱉甲廣橘皮淡竹葉尊體本陰虛陽氣並邪獨發熱兩旬余不解無汗蓋因枯液不作汗邪亦不解也連劑養陰之後邪少鬆則汗大出是雲行雨施正品物咸亨之候何疑其脫也但弱體久病不解元氣愈虧此邪稍出大汗作亦屬接補關頭不可少懈耳心靜則氣定而神住切不可憂擾神氣致陽上升人參四錢熟地黃一兩制首烏五錢抱木茯神二錢生左牡蠣六錢天門冬三錢積勞傷陽哀戚動臟重重內損夏秋伏邪已深入重圍此邪從陰經來故三陰而施溫補扶正正謂托邪知母入咽即厄不飢不食不寐陽不流行三焦困脾腎憊矣肛墜屬陰氣陷難任純剛之劑人參麋角當歸身煨生薑草果仁紫厚朴熱甚心煩躁渴宜宣膻中熱氣兼驅伏暑清心牛黃丸辰砂益元散三錢竹葉心二錢煎湯送下脾胃氣困鬱蒸為黃痛乃陽不流行久病不可純攻山茵陳生益智仁生白朮茯苓皮紫厚朴廣橘皮生香附摩汁痘疹幼科雜治稚年五疳數年不愈脾胃愈損必肝木來乘已有驚恐筋牽皆欲成五癇矣其腹中衝逆為痛即木剋土之象用錢氏史君子丸未有大效用制肝實脾疏腑方川楝子厚朴胡黃連史君子黑糖油生白朮稚年純陽體質瘧痢是夏秋暑濕熱病閲述幾年調理都以溫補得效但幼科必推錢仲陽方法幼稚致傷全在脾胃脾陽少運濕聚泄利溫暖脾陽運行去濕亦屬至理若骨脂附子溫腎稚年恐未宜久進今年太陽寒水司天太陰濕土在泉雨濕太過陽氣最傷大忌苦寒暫服方錢氏益黃散附方乾蟾川連白朮茯苓青皮雞內金人參鬚薏米仁神麯澤瀉煉蜜丸炒米湯下附驚風方全蠍殭蠶天麻川黃連生甘草膽星犀牛黃麝香金箔為衣
