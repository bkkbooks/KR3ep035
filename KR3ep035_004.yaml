body:
  text: 卷四遺精淋濁尿血交白露暑去涼來陽降多遺仍悸恐畏怯用交心腎固攝人參龍齒歸身芡實粉遠志柏仁湖蓮茯神熟地五味子金櫻膏丸苦寒直降陰走泄為遺陽浮越為頭痛咳嗽以攝固二氣主之熟地遠志龍骨茯苓芡實牡蠣瘧熱傷陰數年春秋內熱仍安寢能食想辦事勤勞陽氣易於升動此陽降為遺泄虎潛丸精濁四年據述途中煩勞驚恐而得頭面眩暈肌肉麻痹遇房事必汗泄顧體反壯此陽微失護精關不固溫腎寧心冀漸交合久恙未能速效韭子龍骨覆盆子五味子菖蒲柏子仁補骨脂胡桃金櫻膏丸陰泄為遺下焦諸脈既空不主拘束其陽浮上灼自有首痰咳嗽此治肺無益必填實下元可愈所慮少年精志未堅失於保養有勞屢內損熟地山藥芡實龍骨龜板山茱萸茯苓五味子遠志金櫻膏丸五液下泄陽氣上越壯盛眩暈頭重痿弱不耐步趨正內經謂下虛上實為厥巔疾也填精益腎未常不是但醫藥未分動靜氣味未專耳法當潛其陽益其陰質重味厚滑澀導引確守勿懈可冀其固鮮鹿尾一具切片隔紙烘脆牛骨髓羊骨髓俱隔水熬去滓豬脊髓去膜蒸生白龍骨生白左牡蠣元武版生鱉甲五味子茯苓山茱萸湘蓮山藥芡實方解青鹽以髓丸飢時服前用潛陽填精方眩厥不至而吸短遺精弱如昔形精血未能生旺今當長夏氣泄易觸穢熱最宜林泉寂靜秋分後稍可應接前方去龜鱉加人參咸秋石淋變為濁凡有餘志為濕熱不足者屬精敗而腐見症屬虛治以溫養通補鮮河車枸杞子沙苑蒺藜淡蓯蓉熟地茯苓歸身小茴香拌炒遺精溺濁用填陰固澀之劑小溲不通背部腰膂氣掣攻觸乃濕熱內郁太陽之氣不行仿金匱渴者用豬苓湯今夏瘧疾皆時令穢濕之邪瘧後食物不慎濕留生熱下注遂患淋瀝莖痛便難閱醫取苦勝濕寒勝熱甚是近理但加地黃汁膩濁滋血與通利未合海金砂茯苓皮山茵陳晚蠶沙菖蒲黃柏萆薢精濁已久肝血腎液皆損心熱精自出先傷陰也二仙加熟地茯苓五味龍骨遠志覆盆子破傷淋瀝點滴不能寧忍用通利則遺精腎氣仍無效跌撲必屬驚恐以致逆亂以東垣天真丹緩治以轉旋氣血之痹七旬年歲下元已衰淋閉久不肯愈春正天寒食減無味下病傳中治法非易靈樞謂中氣不足溲便為衰苟得知味知谷然後議病大半夏湯下虛淋悶柔劑溫通杞子淡蓯蓉鹿角霜沙苑蒺藜巴戟色奪脈虛夏秋日加煩倦此非客痛據說左脅中動氣因遺精驚恐而得乃下損精血仿氣因精而傷當補精以化氣紫石英杞子制首烏茯神柏子仁歸身濁病乃濕熱下注久而失治變為精濁不易速愈先用丹法補陰丸一月再議大補陰丸鹽湯送下無夢精遺腰髀痠軟入暮內熱五更盜汗交節前後體質更乏顯然真陰大虧陽無依附浮動不已虛怯內傷若不養陰服藥不效人參五味阿膠天冬蓮肉熟地茯神柏子仁芡實金櫻膏丸尿血即血淋熱遺小腸膀胱為多今四肢不溫膝酸足軟天暖猶欲火烘脈緩小弱此係八脈不攝以壯衝任督脈佐以涼肝乃復方之劑鹿茸鹿角霜炒黑杞子歸身生地天冬體偉肌豐脈得緩小凡陽氣發泄行似有餘裡實不足水穀之氣不得暢遂釀濕下注為濁已經三四年不效氣墜直升陽為法非比少壯陰火自灼之病菟絲子車前子蛇床子大蘹香韭子茯苓覆盆子蒺藜子遺精傷腎氣不收納臥倒氣衝上膈䐜脹呼吸不通竟夕危坐足跗浮腫而冷小便漸少無非根底無以把握難治之症腎氣丸去牛膝肉桂遺精三年不愈寐則陽入於陰溺必自出不禁寤則欲溺大便遺攝固下元不應諒非升陽主治以酸味柔和制其陽氣直升直降是為的法山茱萸山藥金櫻子五味子湘蓮芡實診脈右數左小數入尺淋濁不止繼患目疾是精血暗損肝腎之症凡操持用心五志之火自亢是情志突起非客氣六淫之邪並不許以辛散清火為治熟地枸子茯神夏枯草柏子仁甘菊遠志香附脈左弱下虛入尺有夢久遺足軟如痿行動氣促似喘此督任交虧衝陽升舉務以填塞精竅不及傍治方解青鹽炒黑遠志小茴香抱木茯神湘蓮紫衣胡桃膏淋四年夏秋但淋入冬先兩脅痛左右橫梗必嘔吐痛時溺清痛緩隨淋甲寅年四月用海金沙茵陳萆薢分利濕熱夏季頗安入冬仍發食物不消味厚病甚久蘊濕氣膠固陽明脹絡當天涼氣收飲邪阻氣窒滯發久病深通劑必用緩法攻逐用兩通氣血佐以辛香入絡薑汁炒厚朴白芥子韭白汁浸大黃茯苓桂木土炙穿山甲製半夏麝香水法丸氣鬱發黃飲食不司運納人皆知脾胃不和但夏季之濕鬱必傷太陰脾濕甚生熱熱必窒於陽明胃脈全以宣通氣分使氣通濕走熱清四末微腫黃未盡除陽明之脈尚少流利機關也宜忌厚味腥濁可愈生於術陳皮薏仁刺蒺藜茯苓淡乾薑萆薢桔梗水法丸此長夏受病濕著太陰熱在陽明不忌食物最有發黃疸脹之累必須蔬食使清濁轉運謂因病致傷病去自復桑白皮茯苓皮大腹皮陳皮茵陳木通厚朴萊菔子久痢休息脾胃皆弱今夏濕勝臂痛右瘓濕鬱阻遏經脈流行之氣主以溫脾辛香為里中之表治已得痛緩臂伸當減薑黃蒺藜之走經絡矣生白朮生智仁厚朴草果茯苓陳皮感長夏濕熱太陰陽明不司旋運唇黑肌黃疸之象近痔發便難熱注於腸為濕結宣腑經以清之泄之茵陳黃柏厚朴蠶沙茯苓皮炒塊花廣皮萆薢夏病黃疸是濕熱中焦脾胃之病病小愈能食究未得水穀之精華目微黃肌腠脹耳鳴猶是氣分未為流暢蓋熱傷氣濕阻氣也能慎口腹經月天降可愈生益智仁白朮茯苓廣皮紫厚朴澤瀉生砂仁苦參上各碾細末金石斛湯泛為丸痿痹寒濕著關節痰飲阻氣分咳而痹痛川桂枝茯苓熟附子熟半夏木防己北細辛風毒三載侵蝕血液年才半百已陽事不舉脛骨不勝步趨可稱沉痼之症外治無功當以柔溫之劑益精髓壯筋骨不得痿軟為上虎脛骨枸杞子甘菊花牛膝肉蓯蓉川石斛脈緩軟四肢牽強環跳髀尻牽引壯年有此病起四月中乃時濕邪入於經絡為痿痹之症木防己生白朮羌活防風桂枝木獨活生黃耆川萆薢後去羌活加片薑黃當歸身內損痿痹起於幼年非三因之邪此攻逐通經及傷寒偏熱愈治愈劇蓋精氣暗消蹺維不為己用溫柔固補必須宣通是靜中有動血肉形氣如藏器可久皆若此雄羊肉腎鹿茸金櫻粉虎骨膠砂仁研末當歸身小茴香杜芡實桑椹膏脈小足冷四肢發疹骨骱腫痛風濕已入經絡成痹形脈皆虛護衛以攻邪防風生黃耆片薑黃羌活當歸獨活海桐皮風寒久必入脈絡外衛陽失護已現右肢麻木雖鼻淵腦寒不可發散議和血脈以逐留邪黃耆歸身防風根川桂枝木防己明天麻熬膏風為陽濕為陰二氣相傳窒於肌腠之裡著於關節周行不利為痛得三焦氣行濕無沉著氣通病解飛滑石紫厚朴白蔻仁茯苓皮通草杏仁木防己大豆黃卷癰瘍痔漏肝虛痰癧結在項下海石香附連翹夏枯草土貝母天花粉青黛金銀花行走吸熱熱自上受肺熱下移大腸陰虛之質陽墜成瘍有諸清養金水以治其源務在寂靜莫專於藥功麥冬金銀花黑豆皮甜北沙參川石斛痔血糞前後皆有用力齒齦縫血足冷及膝大便燥艱此屬五液損傷絡虛所致炒焦當歸炒黑枸杞子炒鬆熟地黃五味子淡蓯蓉知識之年情欲易動陰火直升直降瘍久成漏乃內連臟腑之絡脂液滲泄不得收合此外治無益姑停課誦之擾動神氣閒坐嬉悅以調之納食肌肉可得久恃人參當歸沙苑蒺藜大麋茸枸杞生仲疝知飢不欲食則䐜脹小腹痠痛乃肝胃兩經病耳炒黑杞子小茴香廣皮厚朴炒當歸沙苑蒺藜益智仁茯苓脈形已小痛移左右由陽明虛厥陰來侮重按痛緩人參生川椒茯苓細辛舶茴香附子少腹急痛脅中有形因怒勞動肝致氣血凝結久恙不宜峻攻緩圖有益川楝子桃仁炒查橘核青皮小茴香五靈脂青木香當臍堅硬上下氣不相通此濁陰聚阿魏溫潤泄穢通陽故腸中濁氣頻出但結於足太陰經炒黑川椒茯苓生淡乾薑蔥白炮黑附子葫蘆巴閱病原是肝腎虛結為㿗疝但子和七疝主方半屬辛香開泄既有盜汗遺精失血咳嗽等症辛香非宜變溫柔通補法蒺藜補骨脂紫胡桃魚膠青鹽茯神柏子霜雄羊肉腎煮丸濕熱入肝而為㿗疝桂枝木川萆薢晚蠶沙茯苓皮川黃柏海金沙青黛脈沉遲疝沖瘕聚收引拘束痛甚是陽微陰濁痹阻議以剛藥三建湯脈沉伏逆痛不止厥陰挾沖氣為患製附子淡茱萸炙甘草蔥白炒白芍久疝堅硬上攻周身冰冷顯然一團濁陰上干冷汗如油須防陽脫子和辛香破氣難用與驅濁救陽一法炮附子炒川烏生乾薑吳茱萸雄豬膽一枚衝入接服橘核川楝子炒川椒炮黑川烏炮黑附子青木香炒黑舶茴香右脅下痛入少腹陰囊腫大便利覺熱小溲不爽動怒肝膽氣鬱腸胃穀氣聚濕濕阻氣脹欲結疝瘕故痛川楝子小茴香茯苓皮青皮橘核青木香大腹皮炒延胡索又照原方去延胡加厚朴山梔茵陳又用更衣丸七疝肝病為多子和辛香流氣丹溪分利濕熱皆治其有餘偏勝今七旬老年下焦陽已衰微濁陰聚而為脹據說安臥自息已非實症暖腎真少佐泄肝是通陽驅濁方法人參熟附子舶茴香茯苓金鈴子川椒色悴脈芤下焦疝瘕是衝任病乃肝腎精血不足致損耳精羊肉熬膏茯苓淡蓯蓉真沙苑蒺藜子炒黑枸杞子當歸小茴香膠丸散濁陰聚則為脹疝墜則大便秘便通則腹形脹大腎肝之病治宜宣通陽氣安息香炮生川烏頭炮黑川椒淡乾薑舶茴香炮生黑川附蒸餅漿搗和為丸少腹疝瘕沖年不曉因由起於夏月漸加腹脹夏季脾胃司令水穀未運或當怫鬱致肝木鬱勃熱蒸氣結犯克中土使濕熱凝聚為脹雖非情欲致病已屬內傷延綿一載未痊非速愈之病矣川楝子炒黑小茴香青木香蘆薈炒橘核黑山梔炒黑山查肉青皮肝疝症也淡吳茱萸川楝子橘核乾薑肉桂炒白芍青木香荔枝核炒烏梅後加七疝丸地氣混矣擬以前方去白芍青木香加入牛膝澤瀉葫蘆巴小茴香橘核荔枝核脈微澀左弦跗廉麻冷走動無力少腹微滿睪丸日腫察神呆色衰畏風怕寒陽虛疝瘕難愈之疾人參炒黑枸杞子茯苓茴香熟附子當歸川椒經產淋帶女科雜治陽維失護自覺背脊烘熱汗則大泄出不止汗遇則周身冰冷畏寒且不成寐寐則氣衝心跳汗亦自止以陰不內守陽不外護主治桂枝木鹿茸當歸身白芍人參柏子仁左牡蠣茯神經云陽維為病苦寒熱陰維為病苦心痛蓋維脈乃一身之綱維陽司外護陰主內營若家庭夫婦管轄內外事宜也緣二氣日衰營護不周凡勞倦寒暄皆乘其空隙為害為寒為熱陰陽矛盾所致是八脈奇經之病溫補不能入脈不效亦無害若以濕淫客氣搜逐其害大矣桂枝本人參生鹿茸鹿角霜柏子仁當歸身茯神多言耗氣勞倦傷形吸氣不利痛起足跟繼貫脅肋奇經雖非一肝腎所該為多不入奇經之方不效也當歸枸杞子紫石英生精羊肉沙苑蒺藜沖衛為病氣逆而裡急青皮金鈴肉淡吳茱萸橘核元胡烏梅沉香代赭石帶脈橫圍於腰維脈挾內外踝而行勞傷受寒脈絡欹斜不司擁護而為瘕疝麻木不仁非小病也久而痿痹廢棄淹淹當歸身生於潛術淡蓯蓉肉桂鹿角霜後改桂薑朮苓湯產後下焦陰虧焦煩思慮陽升內風皆動上盛下衰久延為厥石決明小生地茯神龜板阿膠天冬白芍麻木便後淋漓帶下兩足冷逆脊髀如墜衝任不固肝腎胃關皆欹溫納其下桑螵蛸淡蓯蓉生杜仲鹿角霜巴戟天炒杞子沙苑蒺藜茯苓鮑魚四兩煎汁泛為丸每早服三錢紅棗湯送下懷孕子淋多熱在下焦產即當愈仍心熱嘈腰痠骨軟是虧生熱主乎養肝陰矣穭豆皮生地續繼茯神湖蓮肉阿膠天門冬產後十年晨泄形寒汗出是下元陰傷及陽奇脈不固遵古人用局方四神丸少腹微膨經來後期多痛秋冬膝跗冰冷沖氣致左脅攻觸脘中脹悶痛不能食此屬氣血鬱痹絡脈不和雖無性命之危然恐有不得孕育之累矣炒延胡炒小茴香川楝子肉穿山甲當歸尾生牡蠣炒灶盡五靈脂生蒲黃接服後藥前方專方溫通氣血痛果得緩瘕氣亦不上攻觸今復形寒食不化與養營方兼暖衝任為孕育之基人參紫石英艾粉四制香附淡蓯蓉肉桂歸身巴戟天各碾細末以白花益母草膏為丸懷妊五月晝夜身熱據述病起惡阻嘔吐吐止熱來思五月足太陰司胎木火犯中營衛自怯必致胎不育長滋養血液佐以清肝膽氣中之熱小生地白芍麥冬阿膠條芩胡黃連天癸當絕今屢次崩漏乃衝任脈衰久漏成帶延綿之病且固其下烏賊骨小生地鮑魚茜草阿膠續斷胎前瘧熱傷陰產後下焦之陰更損衝任脈不下固氣衝咳逆嘔午後潮熱子後汗泄皆陰虛損及陽位夏令大熱發泄絡空脅痛失血雖頗納穀大便溏泄蓐勞下損漸干中上故延綿不愈不疴醫藥無效炒熟地芡實湖蓮五味子茯神烏鰂魚骨先病懷孕到七八月胎吸母氣諸臟腑經絡先衰自救不暇至寢食廢嘔脹不納日加衰憊臨產可危無治病成法人參石蓮肉川黃連草決明少年懷妊惡阻誤藥殞胎十餘年後不孕育每經來周身經絡暨痛少腹瘕觸寒熱皆至乃八脈交損八脈之治非轉展不效紫河車歸身阿膠紫石英小茴香蘄艾茯苓鹿角霜枯黃芩益母草膏丸質偏於熱陰液易虧女人肝為先天月事雖准而里少乏儲蓄無以交會衝脈此從不孕育之因由也凡生氣陰血皆根於陽陽浮為熱陰弱不主戀陽脊背常痛當從督任二脈治鹿胎當歸桂圓肉桑螵蛸元武版茯苓枸杞子細子芩泄瀉減食經水不來而寒熱咳嗽日無間斷據說嗔怒病起其象已是勞怯郁勞經閉最不易治人參蒸冬朮廣皮茯苓炙甘草白芍形冷驚伯旬日經淋漏注心怔悸若懸施自七八年產後致病夫肝主驚腎主恐產病先虛在下奇經不為固束急急溫補固攝仍佐通藥其力可到八脈紫石英茯苓人參烏鰂骨鹿茸炒枸杞子沙苑蒺藜悒鬱內損經阻筋骨皆痛損傷不復即起勞怯溫養流通望其鬱痹氣血和融若但清熱見血理嗽百無一治當歸生杜仲桑寄生炒枸杞子生鹿角遇勞氣泄胎墜胎去下焦先空足冷腰脊皆痛陰陽兩損但以溫養補之懷孕即止歸身肉桂白芍茯神人參沙苑蒺藜枸杞子雄羊內腎產後失調蓐勞下損必映奇經心腹痛寒熱脊到腰痿形肌消爍殆盡若縷縷而治即是夯極凡痛宜通補而宣通能入奇經患者年廿四歲沙苑蒺藜炒黑小茴香人參糜茸當歸身炒黑杞子又方人參三錢熟地五錢紫石英一兩肉桂心七分後加枸杞三錢自產後五日惡露漸少遂卒然右脅下痛引少腹手不可按身體不能轉側此乃臥著於右太早致敗血橫行入絡痛甚神迷昏亂皆瘀腐濁氣上冒胞絡矣此屬產後重病夫通則不痛議宣通脈絡之壅黑豆皮西琥珀末生蒲黃乳香蘇木益母草五靈脂黑珀失笑合方惡露已下些少而痛勢不減此乃病重藥輕瘀濁錮結必有脹滿浮腫喘急之變議用回生丹熱童便化服回生丹一丸蓄血有如狂喜忘症象今絡中瘀聚還注於衝脈所以右胠痛緩而少腹痛脹大便黏膩白滑亦瘀濁之化但必前通溺濁不致凶危即痃痞癥瘕猶可緩商調治矣大黑豆皮杜牛膝炒煙盡五靈脂熱童便西琥珀末炒查肉老韭白絡通痛減病已挽回但少腹余氛瘀留衝脈不必以宿佝僂為重只宜溺通瘀下斯為得矣用交加虎杖合方加炒靈脂鮮生地姜同搗汁和服大黑豆皮琥珀末川楝子炒小茴香白花益母膏丸接服當歸沙苑蒺藜桂圓肉炒小茴香炒杞子炒桃仁丸方生鱉甲八錢用酒醋熬成膏當歸三兩炒查肉二兩炒黑小茴香一兩酒炒香附一兩炒桃仁三兩膏丸每服三錢五旬因怒暴崩繼而氣衝脘悶嘔吐此陰既走泄陽升鬱冒最多暴厥烏雞一隻炙阿膠湖蓮生地茯神天門冬女貞子川石斛麥冬甜北參膠丸服經遲既通兩日驟止新婚未及半月溲溺痛腹中有形恐延淋帶當通陽宣濁老韭白兩頭尖炒黑小茴香杜牛膝當歸鬚益母草自雍正八年八月間生產血暈成疾當七八朝後減食斷乳發渴噁心便難至今經水不通飲食減少每交節候常覺倦憊或稍勞碌及偶著寒即手面浮腫喉痛面赤腰痠服溫補之劑稍得效驗兼有帶症容易惱怒今年飲食略好小腹膨痛便燥有血或便溏不爽紫石英烏鰂骨人參當歸身卷柏桑寄生川石斛淡蓯蓉天冬柏子霜桂心禹餘糧枯黃芩遠志肉川椒蜜丸服三月小產宜涼營固下雄烏雞一隻青蒿汁熬膏生地黃阿膠天冬知母白芍子芩建蓮桑寄生悲泣過甚失音經言憂則傷肺及讀病原向來左脅有形春令陡發沖氣神迷氣急若厥更問經來先期三日月月如此夫左脅屬肝肝為風臟內寄相火凡人身之氣左升在肝右降在肺升太過必降不及為木火反戕柔金醫經逆乘謂賊邪最難向安情志之恙皆曰內傷怡悅調養可望漸和非朝夕改之藥圖僥倖者耳甜北沙參麥冬肉清阿膠鮮生地鱉甲刮光醋炙生左牡蠣丹參肉鮮生地天冬肉茯神胎前咳嗽產後更加失血脈來左數咳甚嘔吐是下虛氣逆衝任內損醫屢投肺藥必致延為蓐勞斷乳調理為上都氣丸四錢淡鹽湯送下十服火升心悸耳鳴少寐月經遲患者時年二十八歲生地阿膠茯神女貞子柏子仁天門冬小產後去血過多陰絡空隙氣乘為脹兩年食減腹現青筋已屬錮疾腎氣丸奇脈空虛腹中瘕痛溫補佐以宣通其力可以入八脈鹿茸白制鹿角霜生紫石英禹餘糧大茴香歸身炒黑枸杞子生杜仲粉同州蒺藜補骨脂用滾水入鹽水許研開蒸餅為丸丸須細堅空心開水下因勞胎損一月人參當歸身茯神白芍棗仁桂心膏方人參當歸身沙苑蒺藜鹿角霜桂圓肉茯苓淡蓯蓉枸杞子熬膏服安胎人參生杜仲蘇梗茯苓砂仁末川續斷廣皮建蓮肉丸方烏骨雞鹿膠女貞子生地黃茯苓烏鰂骨旱蓮草枸杞子湖蓮肉膠丸服妊交三月蘇梗炒白芍茯苓砂仁末生穀芽廣皮丸方生地黃天門冬制首烏川石斛桑葉阿膠胡麻女貞子茯神蜜丸服產後潮山查黑豆皮益母草炒砂糖又方細生地澤蘭黑豆皮丹參茯苓炒山查又方柏子仁茯神細生地麻仁丹參丸方人參桑螵蛸川續斷毛鹿角炒小茴香土炒歸身茯神砂仁醋炒元胡青皮益母膏法丸熱勞丸方生地胡黃連川斷白芍阿膠丹參茯神湖蓮肉女貞子烏骨雞膏為丸腰痛附方人參杜仲熟地歸身麋角膠胡桃杞子三旬有崩漏形體日加充壯此皆發泄外盛內虛如背部周身肌腠之中熱烘肢體皆為動搖陰液內乏陽氣旋鼓病能篇云諸風掉眩皆屬肝木風木不寧陽明脈空暴中暴厥皆由此而起細生地柏子仁麥冬阿膠生白芍茯神冬桑葉北沙參此氣血不和脈絡不通為脹用大針砂丸脹減其經水仍阻左脅宿瘕久聚此病根未去炒熟桃仁生牡蠣炒黑小茴香炒延胡索粗桂木生香附經遲心腹痛泄瀉十五歲四制香附川芎延胡索當歸身南棗肉煨木香紅棗肉丸腰脅刺痛虛里尤甚頭暈跗腫形寒臨經諸病皆集此病久八脈損傷調經和養氣血不得見病治病川芎沙苑蒺藜桂心鹿角霜小茴香茯苓炒枸杞子歸身益母草膏為丸寡居獨陰無陽下焦常冷瘕泄帶下腰髀入夜痛甚自覺腸腑䐜脹而胸次似高突腹形未見膨滿凡諸腑皆陽陽微必陰濁來聚初夏曾定溫通奇經法原效夏秋時邪暑濕客病貽延痛復如昔立冬後十日診議人參川椒小茴香鹿茸補骨脂茯苓歸身熟附子葫蘆巴蒸餅煮糊為丸帶下眩暈心嘈熱背惡寒經來漸遲屬陰虛奇經損傷三十五歲細生地茯神續斷牡蠣阿膠生仲柏子仁湖蓮肉思慮憂愁謂之郁氣血暗傷肌肉日瘦不食不寐心中時覺昏憒是皆內因之症釀痰為癇枯槁成損必得情懷開曠斯鬱結可開目下用藥因夏秋失血以來倏冷忽熱脘悶胸痛自天柱挾脊至腰痠軟如折不但營衛偏欹八脈皆失其職司先議宣暢脈絡勿以滋滯補澀鹿角霜當歸炒枸杞子茯苓沙苑蒺藜川桂枝小茴香炒香附陽浮汗泄如飢忽脹眩暈麻痹產前心痛謂之子懸病起於產後由肝腎內虛真氣不自收納內風掀旋不已病傳陽明脈絡筋骨不司步履乃沉錮之疾河間地黃飲料中去其附桂二味余藥熬取自然膏連次小產初傷衝任久而督帶蹺維皆傷八脈不勻約束陰不下固陽乃上浮如經後期淋帶晨泄上熱下冷浮腫脊酸腰垂耳鳴不寐等症久損不復必以從陰引陽通固兼用若非積累工夫未得旦晚得效人參炒焦當歸補骨脂茯苓青鹽紫石英鹿茸炒黑小茴香生蘄艾蒸餅丸服三四錢小產未復繼為血崩二次腹中刺痛帶下不已當固衝任使絡血生聚可望經調鹿角霜當歸身紫石英炒黑小茴香炒苑蒺藜枸杞子炒黑蘄艾熱升沖咽咳嗽不止兩足冷如冰而至骨脈得細促先天最弱笄年不肯充長倘經水忽閉勞損難治滋腎丸三錢六服早上淡鹽湯送下久病形神日消脈象兼大是謂脈無胃氣矣上年夏季曾診便瀉腹痛食減舒肝健脾疏補春進安胃丸總無效驗此生氣不至女子當天癸將通之年經脈氣機怫逆久鬱熱聚漸為枯涸之象議用汪石山郁勞治法湘蓮肉川芎熟地青蒿查肉歸身香附白芍蓐勞下損不獨病屬八脈則延及三焦晨泄嘔食心熱下冷吸短寒熱用藥豈有止嗽清熱之理扶得胃氣安穀月事仍來方得回春異功加南棗怒勞血吐成升月餘再吐自述少腹常痛夜必身汗出必經水得通可免乾血勞怯醋炙鱉甲炒山查肉胡黃連炒桃仁炒元胡索茺蔚子經來甚少脈左堅搏仍然咳嗆嗽涎沫夜熱汗出肝血肉枯已屬勞損宜進甘緩以養肝胃令其納穀庶可望愈若見熱投涼希圖治嗽胃傷速憊矣生地沙苑蒺藜女貞子阿膠石斛黑梔停經九月少腹重墜而痛及診少陰脈澀小並非妊象且衝任虛餒怕其暴崩八珍湯中加入砂仁經先期三日熱多寒少脈右弦大血分偏熱治厥陰瘧邪窒在血生鱉甲青蒿梗冬桑葉炒桃仁川貝母炒牡丹皮暴崩去血過多絡中空虛浮陽挾內風以心悸筋脈痠軟奇經病也熟地黃女貞子白芍藥清阿膠旱蓮草湘蓮肉冬季腹大大便不爽以通陽泄濁初投相合久則不應寡居獨陰無陽郁慮至少腹結瘕其病根在肝五旬外正氣日衰邪不可峻攻矣六味湯中加入茴香川楝子陰傷於下熱氣上冒脈左堅數慮其失血不可強迫通經丹參柏子仁茯苓澤蘭牡丹皮生麥芽附錄調經種子良方此係原任提臺陳大人所傳屢試效驗如神論曰夫調經之法在平肝保脾脾統血肝藏血如鬱怒傷肝思慮傷脾使脾虛不能統束肝虛不能藏納多有經氣不調之患氣一縱則血不隨血不隨則疾如蜂起肢體困倦面目瘦黃日晡寒熱晝靜夜熱心胸脹痞腰背痠軟飲食無味神不安赤白帶下久無孕育或致半產俱是經氣不調所致此藥宜多服必生雙胎屢驗香附一斤去皮打淨此藥性溫無毒忌鐵器分作八分制一分酒浸和養血氣一分童便制滋離中之陰一分小茴香艾葉各二兩同浸炒乾去茴艾補腰滋腎一分醋浸開氣解鬱一分鹽水制清坎中之陽一分益智仁二兩同浸去仁滋腎強陰一分萊菔子紫蘇各三兩同浸炒乾去蘇萊二味化滯開滯一分姜炒化痰上製法春秋浸三日夏浸一日冬浸五日製法完淨同入砂鍋加蘄艾四兩無灰酒隨煮隨攪色黑為度使氣完固平燥性和調經順氣女人之聖藥也血氣之疾俱不可缺珍之寶之再用後藥開下當歸身四兩酒浸養血和氣白芍二兩酒洗消瘀平肝撫芎二兩開鬱平肝生地四兩酒洗薑汁拌炒乾生血涼血人參二兩益氣寧神如無人參亦可以白毛烏骨雞一隻代之另有製法天門冬二兩去心熟地四兩酒洗薑汁拌炒益精補血酸棗仁二兩微炒清脾安神炙甘草九錢溫中益氣白茯苓一兩乳浸去皮萸肉三兩生精益元麥冬三兩補血潤肺益母草四兩酒洗行氣養血白朮二兩土炒健脾理胃橘紅三兩清痰理氣元胡索一兩五錢炒推陳致新阿膠二兩蛤粉炒成珠條芩二兩五錢酒洗清三焦安胎砂仁一兩寬中理氣康方伯傳海上仙方海參一斤酒洗去砂熬膏羊腰子十枚挑去血膜生打極爛豬脊髓十條去血絲打極爛甘州枸杞子四兩炒脆龜版膠四兩酒化破故紙四兩鹽水炒杜仲八兩鹽水泡炒斷絲淮牛膝四兩酒洗鹿角膠四兩酒化當歸身四兩酒洗菟絲餅八兩酒化巴戟肉四兩鹽水炒紫殼核桃肉一百枚生打爛上劑各碾細末先將羊腰豬脊髓核桃肉各搗如泥然後和龜鹿海參等膠杵勻入石臼中將諸藥末拌勻杵至八九千下方可為丸丸梧子大每服三錢初服於七日內每日晨晝昏三次用淡鹽湯開水黃酒挨次送下服至七日後只於清早淡鹽湯送下或用開水送下服餌亦可此方丸劑艱於嗣育者服之頗有應效也甲戌清和之初因菊溪先生以掃葉莊方案囑鈔其卷後有一瓢老人附錄軍門陳公所傳調經種子良方一頁竊思陰經既調陽不健運則亦不能成其化育之功適於殘編檢得此方附之於末質諸高明不識云可否
