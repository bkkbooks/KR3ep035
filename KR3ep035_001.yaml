body:
  text: 卷一虛勞形瘦體質不為濕害經言瘦人以濕為寶也蓋課誦動心謀慮必由肝膽君相皆動氣升血溢諸經氣皆升舉凡安靜怡悅稍安情志怫鬱病加皆內因之恙且勞心曲運神機去酒色致傷兩途神氣無形精血有形也生地丹參遠志棗仁麥冬柏子仁天冬桔梗當歸五味茯神元參肝胃絡熱暮熱甚失血生地川石斛萹豆麥冬女貞子茯神久瀉利至十餘年陰走泄而莖痿肝腎真氣不主收攝為脹瘕腹鳴邇日形寒不飢不欲食緣陰損及陽暴冷外加口鼻吸入之寒無有不侵及中土之陽病根是肝腎精血內損久病務以飲食為先溫胃蘇陽為穩用治中法人參藿梗木瓜厚朴茯苓穀芽益智仁新會皮能食不知飢痰多咳逆當先理氣清肅上焦本質陰虧再議大沙參白蔻仁蔞仁桑葉杏仁川貝母腎虛督損都氣丸前方用丹溪補陰丸午後頭痛已止精血有形易虧難復仍以咸補填陰法熟地茯神龜膠阿膠湖蓮瑣陽人中白天冬五味豬脊髓和為丸揖拜皆動陰不下固必陽浮升舉況隆冬過暖天氣少藏當春生令至以乙癸同治兼固其下六味去丹澤加二仙知柏五味閲病源診脈是肝腎精血暗虧由至陰傷及陽明之脈身半以上漸致拘束此非外來客邪也六味加鹿茸五味勞傷肝腎奇脈不用遇煩必腰痛背垂雖有失血未可沉陰滋降以柔劑溫通補下以充奇脈淡蓯蓉炒杞子茯神炒當歸身淡補骨脂生杜仲生羊肉腎接案中年夏秋失血再發勞煩內傷背痛腰板肝腎下虧蹺維奇脈不主用事子後汗出陰陽發泄是包舉溫養勿遲苟不安逸藥必無功鮮河車人參芡實大熟地茯神北五味金櫻膏石蓮炒黑遠志勞心至於陽痿當以交合心腎但中年以後陽難充復最不易效鹿茸魚膠韭子兔絲補骨舶茴香沙苑覆盆五味青鹽茯苓遠志茅朮生制早食頗安晚食不化脈左弱細右尺中虛動是脾腎兩虛自陰傷及陽以陰藥中佐以溫煦以坎水中真陽內崇也早服都氣丸加河車午服異功散初春脈動而不鼓亦收藏之司淺矣當壯年未育晨吐咸痰皆水虧火炎精氣不充之象胃旺能納穀當專理下焦不必以痰為慮牛骨髓一具隔水熬羊骨髓熬去渣海參膠淡菜膠線魚膠龜鹿膠熟地兔絲子芡實覆盆子金櫻子家韭子茯苓五味子建蓮遠志肉制首烏少年奔走勞動動則陽升陽氣不主內守咳非外感豈必肺傷必情志未堅龍相內灼衝陽上舉致咳知見咳治肺非辛解即寒涼治不中病徒耗胃口食減其病日凶病人自述自腰以下筋脈不束竟夜不寐晨必咳嘔中下損極顯然明白桂枝木南棗肉炙黑草白芍白飴糖能食反瘦久嗽夜甚沖年精血不生下損難愈之病牛骨髓豬脊髓淮山藥茯苓懷熟地羊骨髓湖蓮肉山萸肉芡實久損之陰不復與柔劑滋填咸秋石阿膠熟地天冬茯神元武版知母川斛膏和為丸中年脈細便燥五液不充即是陰虧長夏失血交秋再發食減什三為下損及胃勞怯難愈之症用藥不宜偏寒偏熱但主養精血有情勿損胃口者芡實龜鹿膠建蓮肉九蒸熟地黃山藥五味子豬脊髓牛羊髓脈小數是精血內損成勞陰虛生內熱久而不復陽氣不傷夜不成寐以包固大氣一氣丹河車秋石紅鉛乳粉形瘦脈虛左部空大嗽病三年行走氣喘據述從臍下氣衝必咳甚而嘔經言久咳不已則三焦受之乃他處纍及非治肺矣思下之任脈失任衝陽由胃及上犯肺致咳須固下攝納滋養腎病在下必先形容憔悴者此也五味子人參鹿胎骨脂茯苓坎氣胡桃蓯蓉脈細小色白食少不易運形容入夏更瘦不獨精血不充氣弱易泄不耐煩勞此臟陰腑陽交損補三陰為是人參熟術茯神芡實白芍歸身北五味熟地桂圓煎湯和丸病是老勞不肯充復入夏時令熱燥氣泄形肉日瘦行動氣喘納食日少平昔喜用冷食只宜用生脈四君子人參麥冬北五味熟術茯神炙草熬膏服課誦煩心情懷優慮五志之陽鬱勃少伸直升直降遂發肛瘍久而成漏最難復為勞怯必開懷怡悅用藥全以胃氣為主人參蒸白朮茯神陳皮炙甘草面色青黃脈垂入尺吸氣短促如喘身熱尤甚此皆精血下奪氣不歸元肝腎損極不復雖填精充髓病深未必能效鮮河車山萸肉山藥茯神熟地黃芡實北五味子白蓮藕搗取汁今夏血症再發入秋音啞喉痛陰損難復生地麥冬天冬北沙參茯神阿膠雞子黃脈下垂右大深春失血入秋半不復飲食仍納無以充長精神由精血久損肝腎不納行動則喘語言氣怯著枕沖氣上逆咳嗆皆損及八脈不易治之症河車杞子北五味沙苑蒺藜湖蓮肉大麥冬人參茯苓熟地黃山藥漿同河車膠為丸脈數虛右大入夏咳嗽失血遂飲食頓減此屬勞傷內因以養胃陰甘藥乃土旺金生之義黃耆北沙參苡米仁炙甘草黃精茯苓老勞有年今夏血痰吐後不但頻咳不已身動喘息不止此乃下元氣不收納以攝固腎臟不與肺喘同治鮮河車塊苓熟地黃紫石英北五味子胡桃肉湖蓮補骨脂山藥粉糊為丸自正月間吐血至今形瘦氣短身動尤甚飲食仍用大便溏著枕臥息不安欲得坐起此下焦衝脈之氣衝上遂令喘咳不已痰系脂液所化吐咯永不清爽下損勞怯症最不易治人參紫石英五味子坎氣石殼湖蓮瑣陽茯苓山藥粉糊為丸壯年脈形數垂入尺痰多曾嗽血冬底盜汗顯然真陰不旺精血雄充若不加保養久延成怯人參熟地黃山藥茯苓芡實建蓮肉牛膝五味子河車膠和為丸向來體質是下元不足上冬過暖氣泄暴冷直侵暴嗽俯不能臥痰多血冒已是下焦厥逆幹上夫不臥之症有餘者治肺不足者治腎而參耆乃補中脾胃藥其見效之故是從中堵截聊以遮攔架隔其沖脾胃得醒谷進精氣少蘇究竟隔二三治法非上乘工夫也當以河車膠益衝任以包舉大氣以臭穢是下焦上泛用重濁之補以填之乃至理也下午余功以四君子湯益土生金用之勿怠確守可愈非比客病傳變朝更夕改者先天原弱繼以病傷是症精血不肯生旺陰不戀陽陽浮氣升煎方以酸收重鎮滋陰填精頗效調攝大旨忌食辛辣下宜夜坐及奔走之勞久服可冀復元金櫻膏青鹽芡實磁石龜鹿膏山萸肉熟地黃湖蓮阿膠瑣陽北五味云茯神少壯脈小數垂尺及澤穴男子精血不肯充旺情萌內震陰火即動此失血咳嗽外寒內熱非外來客病自能保養不致成怯用藥不過治偏無關於生長身中之精氣復脈湯去參桂薑加入北沙參甘蔗漿病乃陰傷已及陽分形羸背寒河車丸包舉填精究屬濁陰之藥必兼建立中陽以崇生氣若醫咳治血滋陰必然敗壞決裂紫衣胡桃米糖煨薑南棗肉白芍炙甘草血後咳嗽食減子後汗泄虛損雖自下起驗諸色脈扶中更要理嗽清涼愈治愈凶異功散形氣精血消憊生生不來豈草木可以充復古稱人參益氣羊肉補陰咽喉如痹佐秋石為外廓取鹹味直至至陰人參雄羊肉腎赤石脂鮮山藥搗漿丸再以秋石為丸病原是陰傷及陽其外寒內熱惡食疆食嘔以及泄瀉皆滋潤涼藥希冀治嗽嗽仍不止胃反受傷然虛損為肝腎病當此地位以脾胃進谷為寶莫言治病戊己湯加入茯苓診左脈浮弦右大而緩視面色痿黃膚乏淖澤據述瀉血已二十年頻用清涼止血血仍不止食減神困改進參朮甘溫有效此乃救前藥之謬未明病機所由來夫積勞者令陽傷金匱云脈大為勞虛極者亦為勞聖人明示大而勞者宜理陽虛而勞之必宜理陰自血去太過自述大腿跳躍按之不息腎液肝血無以養骨營筋內風翔動致奇脈蹺維全不司其約束腑陽臟陰奇脈交損中年以後最難充復日就衰憊宜矣論久病內傷必究寢食今食少艱運寐少寤多莫言治病當固護二氣之衰再參天運地氣之勝復斯身中陰陽消長必有合也人參生益智仁木瓜生於術附方人參芡實大熟地炭茯神五味子石蓮子附方北沙參固本加阿膠又加芡實山藥茯神蓮肉生脈合六味去丹澤加女貞芡實都氣湯加青鉛固本加茯神芡實阿膠五味蓮肉龜版人參鬚八珍湯料為末加河車膠和丸形瘦脈細色奪下焦氣衝心痛咳甚此肝腎精血內虧衝脈之氣逆上所致此治肺清潤無益乃內損之症最不易治熟地茯苓五味芡實石蓮肉炒黃山藥診脈左部弦大若有鋒鋭右脈如數按之虛濡述上秋失血夏季再發交秋咳嗽甚必食谷噦嘔而出凡人身左升主肝右升主肺左升太過必右降不及木反刑金氣不肅化而咳咳甚而嘔況沖年陰火易動龍相交熾胃少寧靜越人有下損及胃之文此皆內動精氣之恙苟非屏絶欲念怒勞徒以藥餌為治草木無情之物不能充精益髓耳人參飴糖漿蜜炒新會皮炙甘草生白芍南棗肉脈右弦大數左小數據述操持過煩遂咳嗽失血血止半年不復肌瘦色奪身動喘促鼻息有音咽喉乍痛乍緩顯然精血枯痿下焦元海乏收攝之權陰不上承但有衝脈浮陽升舉有升無降無秋收冬藏之應乎天地故清涼潤肺無濟乎喘咳諸症皆由根本下怯子令母虛此謂內損草木藉其偏勝攻邪精血有情藥味未能充長故吃藥無功惟潛心屏俗靜處山林寒暑一更凝然不動間有病痊者早晨服瓊玉膏午服人乳色㿠白脈小不食不飢便溏不爽久坐脊骨痛軟行動如喘此精氣內奪失血內損未復更加時瘧再傷涎沫湧吐五液所化非陰膩之藥所宜用參建中湯去薑攻毒金石重墜其氣流入骨髓內蒸爍液漸致內損虛怯凡滋養萸地之藥決不應病當常以青鉛數兩打薄每日煮汁用於煮粥煮飯經年搜剔藥毒方用聚精丸加茯苓夏至陰氣不生乃損不能復矣今當大熱氣泄愈甚百脈諸氣皆空脂液盡耗難更蘇為寒為熱無非陰陽互乘陽由陰上越則頭巔痛風木之火入中則嘔逆咳嗆總之液涸神竭進兩儀瓊玉扶至稍涼再為酌量人參麥冬肉竹葉大麥仁烏梅肉鮮荷葉搗汁水煎沉冷服勞損三年冬季病發遂音啞無聲入春乾咳欲涼飲大便不實所幸胃納頗安以固攝下焦望陰得上承庶可延年熟地茯神芡實川石斛山藥湖蓮脈左數甚夏季嗽血入冬聲嘶喉痛陰損成勞藥不易治生地甜北沙參麥冬阿膠川斛生雞子黃脈細促數是腎精肝血內耗咳嗽必嘔吐清涎濁沫此衝脈逆氣自下泛上氣不收納喘而汗出根本先撥藥難奏功醫執見血為熱見嗽治肺是速其凶矣人參胡桃肉秋石熟地五味子陽傷背寒陰損發熱久嗽失音延及喘嘔兩三年來容瘦膚枯諒非外邪壅遏由營衛偏枯勞損成疴黃耆阿膠棗仁歸身牡蠣炙甘草暑解熱止咳嗽喉息有音唾痰涎沫此腎陰不固虛熱浮溢致咳非湯藥可愈戒酒色嗔怒可安否則延為勞怯都氣湯中加入秋石清阿膠向有失血陰虛春夏又病時氣秋咳嗆舌根白胎形質軟弱以熱傷津液治用復脈法生地麥冬阿膠炙黑甘草麻仁南棗勞損夜熱咳甚皆陽虧無以攝伏陽氣衝脈皆衝上擾為嗽若以清肺治嗽嗽必不愈必致胃傷廢食矣水煮熟地五味天冬女貞實茯神阿膠脈數形瘦久嗽不止六味湯中加入天冬麥冬色蒼脈數嗽已半年納食不多姑以甘涼潤劑不得犯胃生白扁豆玉竹桑葉大沙參麥冬生草寒熱半年嗽血前後胸背相映刺痛是過勞受傷營衛二氣空隙法當甘溫益氣莫與清涼肺藥歸耆建中湯去薑附黃耆建中去薑加牡蠣失血後咳嗆不已行走氣喘心熱脈細數促此下焦肝腎精血傷損陽浮上熾為咳故清肺寒涼則謬復脈湯中去人參寐則嗆咳陽氣不能收入陽蹺痰緑色夜寐不能著枕此為腎病薛氏加減八味湯中加入紫衣胡桃肉脈左數咳必下氣上衝此為陰虧乃怯症之根萌也熟地茯神芡實五味山藥建蓮診得關前搏大納食頗多據説飲酒食鹹味太過致嗽血失音且形瘦面赤從木火刑金治凡酒客不喜甜膩藥味枯黃芩泡淡生石膏知母滑石飛生甘草川貝母左升從肝凡相火內風不寧胃津化痰擾肺為咳而誦讀久坐都令君相上乘臟陰不充必夏至漸生斯時且勿攻苦養至白露可愈熟地山藥女貞子芡實杞子萸肉咸秋石茯苓建蓮肉豬脊髓丸因痢陰陽宿病咳嗽痰多是下焦陰不上承五液泛而為痰涎藥難奏功必須安養待精氣充復可愈熟地炭芡實茯苓炒山藥湖蓮川石斛時氣熱病久延傷陰遂有失血咳嗽夏秋晡熱倦懶受暑熱傷氣也只宜養胃腎之陰不必以其咳嗽而治肺復脈去參薑桂右脈虛大色奪形瘦肌燥瘡痍咳嗽經年曾經失血是津虧氣餒由精勞內損但理胃陰不必治咳金匱麥門冬湯去半夏脈數虛右大久嗽咽喉痛足冷是虛陽氣浮越引導不應曾服八味丸大造去人參牛膝中下交虛痰多嗽甚血止下焦冷寅卯莖舉是陰不攝陽陽自獨升獨降冬失其藏春深怕發熟地茯苓芡實五味子山藥建蓮肉久嗽食減痰多氣短與麥門冬湯數年以外失血形瘦食失行走氣喘自述交夏血症必發發則左脅有聲由下而上蓋肝陽內風旋動血溢皆腎水不主生木若能安養怡悅尚可帶病延年九制首烏旱蓮草天門冬方解青鹽茯神雄羊肉腎女貞子枸杞子麋角膠診脈左部平和右關弦大帶滑此失血並非虛損問胸脘不爽是陽明胃氣不和氣逆則擾動血絡只宜暫戒酒肉辛辣胃和即愈不須介懷紫降香銼末金川斛桔梗廣皮杜蘇子杏仁枳殼萊蔔子脈細嗆血病從下焦氣衝根怯宜戒酒色妥守百日可旺六味加車前牛膝服麻桂湯藥失血咳嗆不已過辛溫耗散動絡姑以甘柔藥緩之炙黑甘草湯脅痛失血數月不止降香末桃仁茯苓桑葉牡丹皮苡米仁藕節汁蘇子韭菜根汁脈小弦虛久嗽失血盈碗血止仍然納食晨起頓嗽甚此勞傷嗽血宜養胃陰治肺無用甜北沙參炙甘草黃耆百合白芨南棗肉蒸和丸左脅痛必血溢黑點塊絡有凝瘀病發兼用通絡消瘀藕節桃仁降香末鉤藤蘇子漏蘆脈左如刃鋒多嗆夜少熟寐嗆甚必血溢此衝脈中陽升乃下元精血不足法當滋填實下元若但寒涼清熱必致胃減便難調治地黃元武版茯苓芡實阿膠山藥湖蓮藕汁膏人乳粉脈左空右濡右脅先痛繼以嗆痰血塊此肝胃絡傷都因情懷不舒之郁形瘦食減甘緩主治生黃耆南棗柏子仁炙甘草當歸茯神形瘦脈數長夏見血入秋發瘧皆陰分不足不耐時候熱蒸發泄趁此胃口頗旺只要靜心保養百日不及一年可復秋石熟地麥冬阿膠湖蓮肉淡菜膠五味子龜版茯苓山藥加蜜和為丸少年脈數形瘦是先天遺熱真陰難旺衄血上溢陰虧無以制陽瘧熱再傷其陰血來更頻延及損怯當以靜藥補陰不必苦寒傷胃熟地黃山藥清阿膠秋石大麥冬山萸肉茯苓形充脈小痰嗽帶血此非陰虛火升乃辛燥劫動胃絡只宜薄味清養胃陰戒酒肉煩勞可安茯苓冬桑葉炒黃川貝母大沙參甜杏仁苡米仁脈左數大而堅用力致傷氣升血上靜坐安養百日可安用養肝陰和胃陽方細生地川石斛大沙參白扁豆大麥冬清阿膠誦讀心煩陽易動陰不能守血隨氣升所喜胃旺苟能安間保養經年不發其脈絡日固藥以壯水制火為主熟地黃山藥建蓮肉大麥冬龜版山萸肉五味子茯苓遠志肉川石斛膏和為丸勞力絡動失血脈大寸搏能食咳嗆用甘藥養肺胃之陰白扁豆北沙參麥冬細生地茯神丹參久有咳嗽涉水用力勞傷失血寒熱不止皆營衛單弱歸耆建中湯去薑一方並去飴痰中血不因咳嗆而出納食漸減此胃絡受熱氣不降津變以甘涼潤降則不傷胃甘蔗搗漿川石斛生扁豆大麥冬茯苓此勞力所傷失血能食無力當養氣以生精血生黃耆當歸身淡蓯蓉茯苓牛肉膠和丸脈數失血不咳面稿勿進陰藥扁豆苡米仁棗仁茯苓川石斛炙甘草秋石少許沖服陰奪陰損心動陽升壯年失血成怯所喜胃旺只要戒欲暫廢讀書勿動心操持百日漸可復熟地黃山藥芡實女貞子茯神湖蓮冬月無明沖悸失血心中惶惶無主精血暗損浮陽內震法以鎮固紫石英杞子黃肉棗仁龍骨五味子過動失血升降失和阿膠茯神天冬鮮生地火麻仁柏子仁勞力陽氣發泄血絲自溢出口乃脾營胃衛受傷法當甘藥調之耆建中去薑加苡薏仁嗜酒沉湎胃虛絡熱加以煩惱易怒肝膽氣火易熾納食味不甘美脘悶常有噯氣肝陽犯胃血必帶痰而出從來酒客喜食爽口之物不用滯膩甜食脈大為陽氣上逆滋陰如地黃於肉皆與體質不相投矣茯苓丹皮川石斛生穀芽桑葉降香末久咳失血食少便溏脈來虛小當以後天脾胃為要清氣滋水為第二義也戊己湯失血後臥著嗆甚欲坐不飢勉強納食脈細促兩足皆冷此元海氣乏不納衝脈之氣逆沖虛怯門常有最不易治熟地炭牛膝炭石蓮蓬炒山藥真桂心紫石英芡實脈左細數右關弦大失血兩三年咳嗽不已行動氣塞腰膝痠軟顯然下焦不主收納是精血內損胃納頗安議從填實下元勿以治嗽肺藥所令妨胃必戒怒勿勞庶百日可望小效經年堅固乃安熟地魚膠山藥芡實五味子茯神湖蓮沙苑蒺藜金櫻子膏丸氣過辛散肺氣散越稚年痰血益胃陰以供肺白扁豆大麥冬茯神北沙參肥玉竹秋暑失血初春再發右脈大頗能納食金匱云男子脈大為勞極虛亦為勞要知脈大為勞是煩勞傷氣極虛為勞是情欲致損欲驅病根安靜一年可期其愈黃耆苡米仁南棗北沙參炙甘草白芨脈細軟澀氣衝失血寐欲遺精今納穀不運神思日倦緣操作太過上下失交當先治中焦心脾之營自旺諸症可冀漸復偏寒偏熱都主剝喪真元宜禁九蒸於潛術人參茯神歸身白芍棗仁廣皮炙甘草當夏四月陽氣大升體中陰弱失守每有吐衄神煩已交夏至陰欲來復進甘藥所謂下損不得犯胃也熟地黃茯神芡實山藥蓮肉甘草絡脈空隙氣必遊行作痛最慮春末夏初地中陽氣上升血從氣溢趁此綢繆當填精益髓蓋陰虛咳嗽是他臟纍及於肺若以清涼治肺必然胃傷食減立成虛損蒙其害者纍之海參膠麋角膠淮山藥山萸肉芡實茯神北五味湖蓮肉金櫻膏水煮熟地黃失血以來氣從少腹上衝即咳逆坐起不得寐乃腎虛不司攝納衝脈上升而然夫衝脈即血海男子藏精女子系胎今精氣內空血獨升舉食入瘕泄火土交憊時師每以清涼治肺治咳不過通套而已非論病也紫胡桃霜人參茯苓淡骨脂紫石英鹿鞭子溫邪未得清理食葷太早蘊熱攻絡咳嗽失血必薄滋味乃效茅花地骨皮桑葉茯苓苡米仁百合大沙參生甘草嗽血三年咽痛聲嘶腹大便溏是清寒治嗽太過嗽仍不減胃傷陰耗陽乃獨升甜北沙參生扁豆茯苓苡米仁生藥炒芡實額準痛齒縫出血口苦舌乾盜汗或表散或飲酒更助陽泄愈加不安皆陰虛陽浮當以靜藥益陰和陽熟地龜版秋石茯苓牛膝萸肉阿膠五味桑堪辛熱肺胃受灼每交夏四月陽氣上升遂致失血以甘涼清肅忌食厚味可愈川貝母地骨皮花粉肥知母苡米仁生甘草少年腸紅陰氣走泄咳嗽吐痰食仍進而聲嘶氣促走動若喘且口乾咽燥飲水渴不解明系陰不上承矣六味湯中加入炒桃仁當歸鬚中年失血兩日陡然舌強無聲四肢麻木身痿足熱此水枯木火化風腎肝之病靜養方可向愈生地麥冬阿膠天冬川石斛龜版寢食如常自上年失血之後巔頂及周身肌膚發疥瘰搔癢春發冬瘥以和血平調方三角胡麻制何首烏金銀花桑葉浙甘菊炒黑杞子紅棗肉為丸胃減吐血後早晨面腫晡暮跗腫氣分乃弱且理陽明生黃耆苡米仁生甘草生扁豆茯苓久咳痰帶血絲納穀已減絡熱胃損最要戒酒辛辣甘寒不傷胃者宜之青甘蔗汁麥冬玉竹沙參知母川貝母春季痰嗽帶血交冬血大吐頭痛口糜是陽不收藏當填鎮熟地炭萸肉炭牛膝炭五味茯苓青鉛失血五年今夏秋發作最重脈左澀右弦沖氣逆則咳甚天明汗泄議用柔劑陽藥以治下病者四十三歲紫胡桃肉茯苓五味子炒黑枸杞子沙苑蒺藜芡實紫石英石殼湖蓮接案失血數發臥枕氣衝至喉似乎痰阻其實吐咯不出此任脈不司擔任衝脈陽氣直衝於上納食多噯下損及胃秦越人尚稱難治便溏凡填補下焦必佐益胃最忌清肺寒潤更傷中氣大造丸去天麥二冬黃柏牛膝加入二仙丹人參河車熟地龜版五味金櫻子芡實夏熱勞力飲酒助熱泄氣血後咳嗽脅痛火升已是肝腎陰傷胃逆多噯須慮食減熟地黃茯神北沙參天冬阿膠建蓮肉人中白川斛膏和為丸脈緩寒失血自述負重傷力已是營衛兩怯當以甘劑益中勿見血輒與滋涼耆建中湯飲食先減中焦已怯辛辣都主走泄真氣二次反覆血來皆夜動不寐而至因勞而發內經曰勞者溫之取乎溫養氣分也黃耆白芨茯苓米糖米仁炙草奔走動陽失血繼而咳嗽吐痰由真陰虧損五液蒸痰趁此胃口頗旺以靜藥填陰攝陽熟地水制阿膠女貞子天冬米仁刮白龜版咸秋石知母霍山石斛血脫補氣況汗血並至者乎冬令人參生芍扁豆熟地黃玉竹茯神花蕊石童便脈微而芤失血之象也膺胸隱而痛肺胃之絡也當歸鬚炒黑山查苡米仁赤芍藥川鬱金絲瓜絡通草冬至已近氣候太溫少陽先升地氣不藏發越之性無物不坼所以吐血之症皆發矣熟地黃女貞子茜草炒白朮苡米仁玉竹旱蓮草炙甘草聲不變而粉紅濁痰不已是絡傷非肺傷也所以臑內痛白芨麥冬蒸術米仁苦參北沙參炙甘草牡蠣中氣不攝非陰弱吐血可比勿進陰藥四君子湯中加入牛膝玉竹盛體失血作酸噯逆脈得左澀右弦合引血乾之條曲直作酸之旨責之厥陰中陽氣上乘為治旋覆花代赭石老枇杷葉塊茯苓新絳屑脈左數搏大因驟然跌僕吐血仍然安穀如常此陽氣暴升莫制絡血不得寧靜而泛越夏三月至秋分戒嗔怒情欲莫令舉發六味加入秋石阿膠川石斛春暖陽氣升越行走動陽失血只宜安養靜坐藥以甘緩不傷胃氣風溫咳嗽初愈暮汗繼以痰血春半陽氣發泄沖年陰未充盛致血隨氣溢讀書聲高則頭痛陽升顯然六味去萸肉加入白芍阿膠麥冬脈緩大吐血甚多仍然安穀此陽明胃絡病也戒奔走煩勞方可冀其奏效生黃耆薏苡仁南棗肉山漆茯苓暑熱傷氣秋燥上加亦令傷氣舌乾咽癢欲嗆胃氣不充肌膚已曾失血兼保陰液為宜擬用喻西昌清燥湯減人參老年因秋燥咳嗽食少胃弱脈小數當以清潤甘藥不致傷胃南沙參玉竹桑葉象貝吧呾杏仁炙甘草脈虛數形寒心中煩熱五更後氣升咳嗆當秋分節燥金司令大熱發泄之餘皆能化燥肺為嬌臟最處上焦先受其沖宜潤燥以滋其化源冬桑葉大沙參玉竹南花粉生米仁蜜水炙橘紅白糯米泡湯煎藥中風過勞陽動內風上蒙清竅頭旋目暗上實下虛若能保養冬藏可安炒黑杞子甘菊炭穀精珠牛膝穭豆皮女貞實此肝風升舉目珠脹咽塞嘔食下焦獨冷常年久瀉今反便難石決明香附汁夏枯草草決明生神麯橘紅眩厥心悸咽中填塞汗泄畏冷都主肝陰虛餒陽明內風上巔生牡蠣天冬穭豆皮阿膠茯神小生地凡動皆陽沖氣至脘嘔酸乘巔旋運食漸減肌肉消是肝木之陽趨胃久而陽化內風直上巔頂而為暈矣煩勞操持君相過動所致情志之病不專功於藥餌石決明生地柏子仁阿膠天門冬茯神耳鳴眩暈心悸寐醒汗出身汗從牙宣失血所致此皆肝腎致傷內風勃升也生干何首烏冬桑葉茯神黑芝麻天冬肉甜北沙參蜜丸秋石湯送下肝風頭暈枸杞子當歸身桑葉蒺藜何首烏甘菊花炒白芍塊茯苓天麻五志中陽氣衝搏心怔悸眩暈多勞多怒老人腑液乾枯內風掀越使然生雞子黃柏子仁生地黃茯神清阿膠天門冬入秋一月天令肅降脈得左寸搏數左關小弦而動是心煩君相少寧肝陽變化內風陡升莫制巔頂皆眩腦後筋惕何一非陽動所致此皆陰弱不主配非肝臟有餘之比法當益水滋木培母另開養心脾之營使上下不致龐雜肝腎方以攝固柔溫宗聚精七寶法以治之赤白何首烏赤白茯苓方解青鹽番舶茴香補骨脂鰉魚膠沙苑北五味子蒸餅和為丸臨臥服心脾益氣養營方用歸脾湯去耆桂六七年病猶然納食行走辦事凡肝膽之氣從左升直至巔頂風木必剋土位胃脘似乎悶悶外象若冷為深當以龍薈丸苦降治之龍薈丸肌腠乾燥而目因起胬肉不飢仍能進食神識晝昏夜慧詢中年鰥居而陽事易痿有夢遺精其損傷在肝腎精血首烏九制甘杞子菊花炭柏子仁淡蓯蓉茯神驚必動肝久而陽氣變化內風旋越不已有升無降陽不交合入陰不但遺瀝精濁入夜遑遑欲絶宜攝陰鎮陽法磁石五味龜版棗仁龍骨萸肉茯神當歸脅左熱攻心及背痰多面浮肢麻肥人肝陽偏熾乃性情易嗔怒所致復脈去參薑桂瘦人稟屬陰虧耳鳴眩暈是內風陽氣之震磁石制肝陽上吸質重鎮納歸腎然必少用填補於甘酸味厚之藥為合法用之不效乃補攝力輕所致熟地黃天門冬龜版紫胡桃肉山萸肉磁石麥冬五味阿膠芡實各碾末煉蜜和為丸每早服六七錢五旬向衰水不生木則內風動越巔頂眩暈唇燥跗無力小便頗動議填下元不足之陰人參天冬五味杞子茯神熟地生地瑣陽首烏據説夜坐久勞脅下氣升耳鳴頭暈目中黑暗無光此肝風陽氣上蒙清竅久恐僕厥地黃湯加磁石五味脾胃居右氣行於左左手痿瘓不知痛癢不能把握所謂胃氣虛則不用者是也王金壇云偏枯之病未有不因真氣不用旨哉斯言治法專培氣分補而宣通可望其效人參黃耆生白朮附子生川烏頭右股痿瘓無力甚於秋冬緩於春夏是陽氣不足也但三旬壯年不宜有此耆附湯右瘓舌喑無聲脈小微澀病起上年十二月仍能納食此中於脾絡治以宣通靈竅白附子熟半夏茯苓鮮石菖蒲根汁薑汁浸竹節早服地黃飲子脈緩男子右癱麻木丹溪議從血虛有風思起病值冰雪寒威以舒筋湯黃耆當歸桂枝羌活防風撫芎薑黃桐皮半百已外陽氣日薄衛弱不司護衛右肢麻木風虛也耆附湯合玉屏風散加桂枝甘草薑棗附方二陳湯加生白芍桑葉羚羊角竹瀝薑汁法為丸中年麻木筋脹陽氣已衰內風自動最怕痱中脈微色痿宜溫補通陽生黃耆生於術炙甘草熟附子南棗肉老生薑後加人參脈靜寢食便調向有胃痛飲暖燒酒相安今年春季跌僕右肢偏麻語音不爽是皆氣傷痰阻致內竅少靈也白金丸菖蒲根汁法丸木兼金化右痿太陰受邪聲鼾厥陰亢極目瞑內風擾動汗出呼欠頻頻陰陽欲分面淖澤外越之象也先擬熄風輕通之法由節令初升之故耳羚羊角鮮石菖蒲生牡蠣馬料豆天麻橘紅接案目瞑戴陽脈空大肝風正甚易回也鉤藤白芍生地羚羊角料豆桑葉玉竹川石斛接服人參杞子遠志白芍熟地北五味大熟地茯苓巴戟橘紅後改歸芍六君子丸素乏深藏適逢冬陽泄越真陽從陰中走出金反畏木右縱左拘神清志昏上實下虛數日外腑氣不泄使陰陽漸交方可商治人參淡附子炒遠志肉炒熟地黃炒枸杞子茯神分三次每次調入豬膽汁以味苦為度少陰不藏肝陽升亢發為痿痱玉竹生地羚羊角川貝赤芍桑葉知母鮮石菖蒲遠志川石斛右瘓舌喑足痱面赤戴陽呵欠微厄診脈小濡而緩此腎納失司肝風突震但病起耳後暴腫必兼濕熱客氣清上輕揚腫勢頗減七日以來當陰陽經氣一小周天不必以時邪引病為惑昔河間宣明論中謂舌僵難言其咎在乎舌下經脈不主流通以腎脈縈及舌下耳其主地黃飲取意濁藥輕投機關漸靈並無礙乎上氣痰熱仿此為法熟地黃枸杞子牛膝石菖蒲淡蓯蓉茯苓川石斛遠志肉接案脈象左部稍振水虧風動左牙痛蓋風從內旋乃陽之化氣只以春升少納下元不司收藏虛症何疑況因目恙頻用韭子煙薰查本草辛辣升騰助陽損真人於遺濁用之藉其升陽以涵陰更無漏泄耳今痱中八日聲音漸振者乃精氣略有寧靜里竅略有靈機是順境也不明此理仍用辛泄加人參亦是清散上焦之藥但肝腎臟虛在於至陰若再投辛苦以傷其陰必致虛症蜂起專望其向安倘必以上有火熱古稱實火宜清虛火宜補溫養柔和與溫熱剛燥迥異幸勿疑訝生地麥冬女貞子阿膠茯神石斛接案十二日來干支一輪右肢痿右足跗略有痛象舌竅未靈味少甘美虛象顯然三日前主家以齒痛為熱醫迎主見即投辛涼解散此症虛在肝腎下焦若不固納維本漫無著落仍以前法加入涼肝可也熟地茯神牛膝遠志肉杞子川斛天冬甘菊花內風皆陽之化氣然非有餘是二氣不主交合今形寒跗脛背冷似屬陽虛景嶽云陽失陰而離者非補陰何以攝散失之陽此病發皆主乎動前法多以靜藥謂病象在身中之左有升無降據説舌絡牽掣喑不出聲足不堪行動與河間肝腎氣厥同例主丹溪虎潛法虎潛丸又地黃飲子去附子加鹿鞭子煎汁搗為丸陽明脈衰厥陰風動頭暈心悸肉瞤麻木有風痱之纍少飲加谷易安淮小麥北沙參炒麥冬南棗肉酸棗仁炙甘草中年脈弦右臂肢指麻痹凡男右屬氣分氣弱陽不運行則痰日生乃水穀不主變化精凝當以健中佐運為主蓋脾胃主四肢滋陰血藥多膩為痰樹幟矣六君子加蒺藜水泛為丸麻木在身半以上清陽遏阻亦夏秋伏熱致傷清上可愈桑葉肥玉竹枇杷葉馬兜鈴川貝母杏仁大沙參天花粉陰虛陽逆是病遇勞即發安養稍愈身心不堪煩動男子苟非素豐難以坐食耐久者不關腎藥之治病也綿黃耆耆神遠志肉棗仁炙甘草當歸龍眼肉營出中焦心脾皆怯滯補耗氣皆忌不耐煩心屬虛此辛甘養陽養營一法有合乎心脾矣人參茯苓桂心炙甘草菖蒲當歸桂圓煎濃湯泛為丸有年勞傷神瘁膚無膏澤時欲腹鳴啾痛營虛不得流行之象開懷安逸僅可帶疾延年熟地黃炙黑甘草人參肉桂遠志肉當歸身白芍養營膏子藥方熟地黃桂圓肉茯神黃耆人參枸杞遠志肉炙甘草當歸五味子形神過勞陽動不靜六脈皆弦大徹夜無寐以靜攝心肝腎之陰大熟地棗仁天冬青龍骨龜版茯神生牡蠣遠志知母五味子川斛膏丸述夏令氣暖發泄自覺跗廉筋骨氣空如墜未至深冬即欲暖護兼以易怒熱升此屬下元精血暗損仍多操持煩勞心陽動吸水虧肝木少涵平素不受溫補及參朮益氣議以滋填充髓主方且痰多食少又必顧及胃氣線魚膠沙苑蒺藜茯神鹽水炙補骨脂甘杞子柏子仁霜砂仁九制赤白首烏川黃柏紫胡桃霜茯苓方解青鹽向多牙宣陰虛火炎三瘧入於陰蒸爍脂液日加枯稿消渴多飲液涸引水自救急當滋補肝腎之陰加以血肉填精包舉大氣制何首烏天門冬麥門冬生地黃熟地黃各碾末以河車膠和為丸能食知味病不在上中口糜舌絡紫絳喉痛腹熱小溲甚少都因肝腎先虧熱伏於裡陰傷陽越汗從此泄知母生雞子黃細生地黃柏上阿膠黑豆皮接服大補陰丸中加入阿膠腎開竅於耳膽脈遠出耳後經以腎藏液三合膽藏汁三合煩勞太過液耗汁干少陰少陽樞機不利遂有失聰之狀中年有此液少風動使然磁石地黃湯脈數耳鳴吐痰天柱骨腰膝酸兩足冷此陰虧陽升當填補實下左歸去牛膝合二仙膏冬至藏陽腎主收納今質疲陰虧偏熱夜深久坐陽不入陰浮越及耳鼻上竅先用東垣滋腎丸鹽湯送下勉強搖精致陽縮囊縱不但形弱傴僂肛門臍竅皆為收引咽喉牽絆似垂食物漸漸減少由精血之傷有形最難自復少陰厥陰脈循喉嚨開竅於二陰既遭損傷其氣不及充注於八脈故症見拘束之狀上年進柔劑陽藥服後巔頂維脈皆脹耳竅戀鳴想臟陰宜靜可藏試以乘輿身布必加局促不安宜乎升陽動藥之不靈矣夫少陰內藏原有溫蒸諸法厥陰相火內寄惡暖喜涼仿丹溪法咸秋石鹽水炒知母真阿膠柏子仁生地白茯苓炒黑遠志肉龜版去澀搗遇天氣鬱勃泛潮常以鮮省頭草葉泡湯服三次取芳香不燥不為穢濁所犯可免夏令時令之病鮮蓮子湯亦好若汗出口渴夜坐火升舌碎必用酸甘化陰以制陽光烏梅肉三分著飯蒸熱冰糖三錢略煎一沸服飯後茶飲只宜炒大麥冬湯岕片至其松羅六安味苦氣降中虛者不宜用脈數上盛下虛當固其陰熟地黃麥冬炒山藥川石斛茯神阿膠五味子石建蓮勞倦陽虛寒熱脈濡食少腹鳴煩倦無力此屬勞傷陽氣當與甘溫補其營衛苓桂朮甘湯中加入薑棗身半以上為陽天明少陽生動乃痛清陽傷矣酒肉濁味之補皆陰凝助痰耗氣當以東垣法調之人參茯苓白朮桑葉炙甘草牡丹皮勞倦中虛陽少旋運遂脘悶不飢醫投發散消導中氣更傷溏瀉生穀芽生於術生益智茯苓廣皮米仁向屬陽虛體質煩勞更傷陽氣春季暴冷雨濕脾胃之陽易困納食不運噯氣䐜脹皆清陽不司流行濁陰欲聚氣滯無法當辛溫理陽藉以通爽用疏胃補脾法人參塊茯苓紫厚朴益智仁廣皮生薑因遭顛沛胃痛食減吐痰遂致肌瘦形寒此中宮陽氣為思慮鬱結日就拘束之象東垣升陽擴充脾胃郁舒則陽可復振炒焦白朮茯苓高良薑煨葛根廣皮炙黑甘草紅豆蔻煨升麻診脈弦澀之形已退夏秋病邪已去但食少神不爽健欲大便肛門下墜是皆氣不復為之氣陷不藏都因憂思致傷開懷怡悅可安不獨恃藥餌用升陽法炙甘草人參茯苓薄桂生薑當歸廣皮南棗陽氣素虧背部怕寒冬月嗽甚欲坐入春納穀䐜脹脈左弱右弦議濕中有熱氣蒸肺氣膹郁口舌咽喉仍窒早服葦莖湯夜服威喜丸喜暖畏冷陽氣弱少護衛近日耳閉失聰非外邪客侵由乎氣不下納所致先用鎮逆導引主之磁石萸肉菖蒲牛膝茯苓熟地遠志五味龜甲夏秋氣大發泄身中之氣久虛無以主持故見病治病無功而安中納下每每獲效入秋進附子七味丸頗合今秋分後天氣漸升地氣收斂緣久熱傷氣虛體未能收肅是以肢節時寒巔頂欲冷無非病久諸氣交餒斯外衛之陽少護液髓暗枯則血脈不營而陰乏內守凡此皆生氣之淺薄也急當溫養益氣填補充形助秋冬之收藏豫為來春生髮之用內經有四季調神之訓今投藥亦當如此旨鹿胎一具酥炙羊肉腎十對熬膏黃狗脊十副熬膏肉蓯蓉青鹽九蒸熟地黃北五味肉湖蓮子茯神人乳粉柏子霜鮮河車一具漂洗用諸膠地黃搗和余劑各為末杵和為丸每服四五錢人參湯下痢久傷腎氣不收攝肛門如錐刺痛而下墜小溲不利先議升陽一法生鹿角人參茯苓陽起石另研細調入當歸身生菟絲子面黃肌瘦脈數虛形寒食少乃勞倦致傷不可為外感有餘議用小建中湯脈澀緩無神脅痛吐痰腥穢漸至減食短氣寒熱肝病入胃顯然勞傷不復當歸建中湯去薑色奪脈小形寒久嗽皆營衛二氣久損病屬勞傷內經云勞者溫之損者益之參耆建中湯去薑脈大緩而無力色黃痿瘁喜暖惡涼心下痛連及脅肋此勞倦內傷久則延為脾厥脾主營以辛甘溫養血絡當歸桂圓肉茯苓桂枝遠志肉炙甘草交四之氣熱勝元虛乃氣泄之候營衛本乎脾胃不耐夜坐舌心腐碎吸短氣似不接續中焦喜按始得暢達目胞欲垂難舒四肢微冷失和從前調理每以溫足三陰臟兼進血氣充形病減七八今當長夏脾胃主氣氣泄中虛最防客氣之侵是補腎宜緩而養胃生津寧靜斂液仍不可少俟待秋深天氣下降仍用前法為穩擬逐日調理法人參淡天門冬茯神建蓮肉酸棗仁知母川石斛甘草上各末為丸咳喘頻發脈細畏寒乃下不納桂苓五味甘草湯中加入紫殼胡桃肉勞倦內傷更為暴冷外襲營衛不和咳逆身痛忌食葷酒助邪天暖陽和病去茯苓桂枝湯脈沉遲背寒色奪久有勞倦新年暴冷再擬用桂枝加白朮附子湯虛損暴寒外襲小建中湯郁春交旬日形症小愈但右脈仍弦舌白味變酸甜昔喻嘉言云當以氣雄剛藥能變胃不為胃變人參淡附子吳茱萸茯苓熟半夏生薑汁三焦鬱勃之熱因勞心而熾口臭難飢便燥以苦辛暫用藿香葉炒竹茹黑山梔白豆蔻杏仁廣皮酒客濕勝熱鬱脹悶噯氣無寐得茶愈脹先與三焦分消白蔻仁杏仁紫厚朴茯苓皮綿茵陳金石斛半夏久痛用辛溫兩通氣血不應病已十年不明起病之由今便溏溺赤水穀酒食不運必挾濕阻氣化主以分消山茵陳豬苓厚朴米仁苓皮澤瀉蔻仁吞酸欲嘔吐喜靜惡動從鬱怒氣逆病在肝胃此一臟一腑病和陽解鬱牡丹皮黑山梔鉤藤鬱金半夏茯苓金石斛廣皮
