body:
  text: 卷二痢疾泄瀉便血鼻癢心辣閃爍即大便下血形瘦脈小數已經數年枯黃芩生白芍清阿膠痢疾自止頭痛至腰二便得通少安議通太陽以驅濕鬱木防己生白朮紫厚朴桂枝木苓皮廣皮邪陷入里瘧變為痢古稱經臟兩傷方書都以先解外後清裡拙見論病先究體質今素有血症且客遊遠臨從陰虛伏邪是用藥須避溫燥劫陰矣鼻煤齦血舌張乾涸陰液有欲盡之勢奈何邪熱內迫有油干焰滅之危醫見病治病不審肌如甲錯脈細尺不附骨入夜煩躁不寐議以護陰急清陰中之邪熱生雞子黃黃柏清阿膠白頭翁北秦皮小川黃連細生地産後病起下焦為多今右偏頭痛得暖為甚納食則脘腹加痛必瀉而後己夫病隨利減已見濕鬱氣阻熱是濕升恆有是症從脾胃門調治下血後大便燥閉不爽繼而自利白滑膠黏日數行下不禁年五旬形衰脈沉必因久伏水穀之濕府病宜通以溫下法生茅朮製附子紫厚朴制軍濕多成五泄陽氣日衰下元不振向有下焦痿躄用四斤丸得愈夏秋當用脾胃藥生於潛術木防己川萆薢白茯苓川桂木瀉血原從痢起食物不忌垢瀉不清致延二年不愈胃苓湯濕伏為熱先瀉瀉止腹痛耳竅膿水微出血淡滲以分消連翹茯苓皮淡枯芩紫厚朴滑石赤芍淡竹葉煎送保和丸脈弱形瘦食不適必泄瀉此陽氣已傷未寒下焦先冷用繆仲淳雙補丸向有遺精腎陰不攝正月間糞溏積下入秋足脛浮腫目下漸上遇冷為甚脾腎雙補丸久嗽是宿疾近日腹痛瀉利是脾胃受暑濕客氣當先理邪痛瀉止再議炒扁豆藿香梗茯苓炙甘草木瓜廣皮厚朴陽微濕聚成利必溫通其陽斯濕可走擬用冷香飲子長夏入秋脾胃主氣濕鬱阻氣為痛為瀉更月不愈中宮陽氣未醒仍有膨滿之象導氣利濕主方茯苓皮草果藿香梗廣皮厚朴大腹皮脈微晨泄初冬未及藏陽以脾腎治最是納穀減少當以中焦兼理其下人參炒乾薑炙甘草生於術淡熟附子淡吳茱萸腸紅既止便瀉三年火升則能食熱墜必妨食此皆陰氣走泄陽不依附當從陰引陽赤石脂瑣陽五味子水煮熟地黃砂仁末拌炒禹餘糧遠志蒸餅為丸脾腎虛瀉苓朮兔絲砂仁山藥粉和為丸幼稚夏季不食腹痛瀉積交冬未愈憶今四五月久雨潮濕之蒸皆令脾胃受傷半年來虛中留滯當疏補兼投食物冷滑肥甘須忌人參麥芽茯苓生益智仁白芍炒山查廣皮焦術砂仁神麯漿和丸大病後飲食起居皆不如法以邪陷入里舌乾自利恐其深入陰中則危矣白芍甘草附子枳實平素陰虧熱注入里為利糞結便出痛墜診脈左堅下垂不以脾胃燥藥細生地阿膠炒查穭豆皮生白芍寒熱脘腹脹嘔惡舌白利及久痢不曾復元再著風濕之邪藿香白蔻茯苓廣皮厚朴澤瀉保和丸食物不運太陰脾陽受傷濕熱內蘊氣窒為腹脹痛下利據説脹起上年痢在今秋但主理氣溫脾祛濕用冷香飲子草果藿香梗茯苓皮木通厚朴大腹皮廣皮目紅黃脘脹下血紫滯裡急後重此夏秋濕熱與水穀互蒸致氣分窒塞三焦不清當薄味蔬食不致釀痢白蔻銀花桔梗厚朴木通茵陳槐花廣皮茯苓皮本病下損利再傷陰從肝腎治勿以瀉痢投燥燥則劫陰矣人參炒黃山藥炒查肉熟地黃廣橘紅茯神夏秋痢疾大率水土濕熱致病用藥都主苦寒攻消清火最多但體質久虛帶淋經漏當利起經帶交熾因時病纍及本病未宜香連檳朴大黃大泄之劑矣良由下焦不固利必亡陰小腸氣鬱糞垢欲出痛墜不爽此宣通垢滯又必顧護陰氣凡看病必究體質勿通套混治細生地炒銀花炒黑砂糖炙黑甘草穭豆皮炒查肉炒白芍久痢久瀉肛墜頻頻不爽此乃腎傷脈來數小醫作脾胃病治故不效熟地黃炭炒焦歸身漂淡補骨脂炒菟絲子五味子接案久痢治法非通即溫既曰腎病則陽宜通陰宜守矣熟地炭熟附桂枝木五味炒川椒炒歸身接案柔中佐剛利未得減下焦常冷過膝仲景四逆湯厥陰下利少腹有形五味加茴香椒目接案動氣在少腹左右糞與血或前後秋利交冬不愈當溫其營人參潯桂炮薑當歸以小茴香拌炒茯苓炙甘草脈沉遲下利血水神呆不欲食四肢冷前已完穀與溫理其陽人參附子茯苓炒黃乾薑生白芍長夏痢症皆因濕熱繼而先泄氣後下血蓋變內風混處腸絡是為腸風血去陰氣日傷為眩暈無力主以甘酸化風益陰節勞可以不反熟地黃炭當歸身炭地榆炭柿餅炭槐米炭炙甘草下痢腹痛初因寒濕傷脾久變濕熱著於腸胃痛利不減腸中硬起不和不得流通明甚當以苦泄小腸兼分利而治川連查肉木通川柏澤瀉苦楝皮清暑和中痢減痛緩醫惑於痰嗽多以清涼視面無華色血氣更偏東垣云瘧痢都因脾弱用戊己湯上有鼻竅濁涕紫血下則遺精便血但説腎虛陰不配陽未必上下皆病意者本質固虛水穀之氣聚濕濕生熱熱升熱降致上下不寧此酒肉鮮腥須忌謂助其濕熱也生白朮黃連黃柏防風根地榆槐花煨葛根茯苓水泛為丸上窒下墜手太陰陽明病下血久兼理厥陰升麻槐米歸身桔梗炒芍炙甘草血奔腸紅都是陰液走泄陽浮發泄易汗背寒心熱臟陰腑陽交損形體日漸消瘦皆衰老液枯之象鮮生地阿膠茯神火麻仁柏子仁天冬先糞後血為遠血臨便先痛恐有濕熱凝阻分利逐濕主之生於術炒槐花木瓜茯苓地榆廣皮脈兩關弦虛先血後糞兩月未已當年原有病根遇勞而發屬虛仿仲景黃土湯黃土湯加炒焦白朮四劑後加人參一錢陰絡傷則血內溢久藥鮮當以甘藥投之人參生地黃升麻槐米血餘龜版又方人參桂圓肉炒白芍白糯米赤石脂炙草炭酒客便溏腸紅是內傷之濕戒飲酒既愈夏天濕勝氣泄病發自述食腥油大便即頻宗損庵劫胃水法生白朮熟附子生白粳米炮黑薑汗脈弦無胃面青呻吟汗出目瞑是為肝陽外泄宜與腎同治熟地牡蠣白芍麥冬小麥大棗炙草自汗不止目閉則胃郁背熱如火心悸動而汗止此肝苦急之候也以甘緩之炙甘草淮小麥茯神白薇南棗肉白龍骨人參柏子仁棗仁汗出亡陽神虛畏怯心悸則汗漏勉議固陽守陰之藥人參桂枝龍骨茯神炙甘草左牡蠣心悸狂癇暈吐緩心悸痛炙甘草枸杞子茯神生穀芽人參當歸身肉桂後改養營丸抑鬱頓挫侘傺無聊心乃偏倚十二官皆無主則陰氣並於陽也投以重性之劑鐵落真鬱金半夏苦參塊茯苓橘紅讀誦久坐身似靜心多動陽氣皆令上亢陰氣無能上承故心悸惟靜處為宜藥不易效也補心丹痞脹便祕氣分上熱吸爍津液能令便艱當滋養營液其心痛必安柏仁茯神鮮生地天冬阿膠炒桃仁腸中變化失司胃氣不得下行此不飢少食因由也夫小腸為火府非苦不通以六府皆陽氣窒則變熱矣用小溫中丸苦藥已得小效蘆薈砂仁殼雞肫皮胡黃連青皮脾胃不和食後不化晡暮陽不用事納食痞脹不寐病起夏秋必因時令之濕久延半年未痊又慮陽微濁凝為脹滿故厚味須忌生於術煨益智炒澤瀉茯苓煨薑新會皮臍左右兩傍按之痛交子夜漉漉有聲時或氣脹此皆腑陽不通欲結腸痹非臟病虛寒矣八味湯不效謂此小茴香川楝子茯苓皮青皮豬苓青木香腸痹治肺丹溪方信不謬但酒客久蘊溫熱亦有濕結便祕一症當以辛苦寒專理氣分之滯真茅朮製半夏冬葵子生石膏山梔仁晚蠶沙臨服磨入大檳榔汁二匙老年脈沉目黃不飢不食腹痛自利後墜溺澀此長夏濕邪傷於太陰脾位陽不運行濕熱凝注法當溫脾導濕佐辛香以宣濁補中益氣甘溫升守壅氣宜乎䐜脹議開太陽溫太陰方木防己川桂枝大腹皮生厚朴草果仁新會皮小茵陳茯苓皮痰滯下泄痛緩腹脹喜按此屬虛痞為勞傷無形之氣川桂枝川黃連生白朮厚朴廣皮寒暖飢飽失和日晚腹中䐜脹脾胃氣鈍深秋最防瀉利藿香生智仁厚朴炒元胡茯苓皮陳皮大腹皮炒黑查肉又橘術丸脈沉遲食入腹脹便溏平昔飲酒中傷留濕阻氣小便不爽用香砂平胃散香附砂仁制茅朮厚朴廣皮炙草水泛丸血結為症氣聚為瘕病在絡為脹形寒鼓栗已是陽微夏季腹膨溺少議暖水藏大針砂丸滾水送下少腹宿瘕悲哀癇厥繼而腹脹大滿直至心下經來淋漓過月乃止其脹不減便瀉溺少肢冷內熱是氣血皆病議溫水臟法大針砂丸不飢少寐二便不爽經脈中牽掣此非風寒從表乃長夏水土之濕與水穀之濕互蒸氣阻三焦不通中年兩月不愈恐延格脹之纍白蔻仁杏仁厚朴廣皮苓皮茵陳防己客遊勞頓陽氣先傷夏季濕邪是陰鬱遏身中之氣經旨謂陽邪外寒胸中清陽不旋不飢痞悶先治其痞仿仲景薤白湯桂枝薤白生薑茯苓半夏自云䐜脹左脅痛勢休息大便日下黏濁臨便自覺冷痛凡五臟錮結為脹六腑濁痹為聚數年久病難以廓清議溫下法大黃草果青皮附子厚朴陳皮經水不來腹大足冷浮腫此乃血分鼓脹四大症候何得渺視禹餘糧丸接服人參澤瀉淡乾薑茯苓淡附子又禹餘糧丸夏秋內伏暑濕皆是陰邪久瘡漸致食入痞滿形寒脈小當溫中醒陽莫以清涼治瘡薏苡仁茯苓肉桂生白朮豬苓五加皮陽微氣不流暢脘中痞滿噯氣人參半夏白旋覆花煨薑丁代赭茯苓廣皮南棗肉陽氣不旋不飢強食薤白茯苓橘紅皮半夏白酒述小腹之右入暮有形如梗按之而痛此為疝瘕肝病乃濁陰凝聚必犯胃氣大半夏湯有去痰扶胃之功必加泄濁和肝勿令致脹滿人參茯苓炒小茴香青木香半夏炒橘核川楝子脈沉湯飲食物嘔吐吞酸胸高腹脹二便不爽濁氣上阻柔溫宣通熟半夏白蔻仁新會皮藿梗生薑汁大杏仁紫厚朴茯苓皮脈微小而遲久食物不進形色枯悴畏寒此為無陽延久成脹人參熟附子生益智仁茯苓炒乾薑左脈獨弦臍突筋青肝脹顯然脾愈虛肝愈實又不合實脾治肝之法先泄肝郁李仁柏子仁茯苓皮炒烏梅炒桃仁赤芍藥薏米仁由食冷脘脹溏泄漸漸目眩神疲筋縱腳弱陰陽日衰前進薛氏腎氣丸相投今夏月土衰木侮必兼理陽宣通不致濁陰結聚脹滿矣人參乾薑茯苓椒目淡附子水泛丸晚服早上仍用薛氏腎氣丸腹右有形為聚脈大食入即脹治在六腑香附生磨汁草果白朮茯苓三稜厚朴南楂肉廣皮脈微遲左脅宿痞漸腹脹便溺少明系濁陰上攻當與通陽製附子炒茴香茯苓椒目澤瀉遠志時病食復至今不知飢飽大便不爽右脅之傍虛里天樞隱隱有形此陽胃絡經行之所多噯氣食不化並不煩渴已非攻下急驟實熱之症先用丹溪小溫中丸據述上年秋痢峻劑攻逐病愈不能復元自小腹䐜脹漸延中部按之仍軟此真氣不收法當溫養奇經使元海壯而病卻鹿茸斑龍丸法加茴香夜服資生丸去連夏秋痢疾是時令溫熱邪未清爽即食腥味致脾胃受傷舌膩白苔食減無味氣墜足腫久久延成中滿也但數月久病旦晚未能奏功生於術廣皮生益智仁茯苓厚朴生砂仁三陽結乃成膈先用更衣丸三錢破小腸之結後服煎方枇杷葉桃仁製半夏柏子仁蔞仁杏仁鬱金桔梗高年陰結半硫丸三錢分兩次人參一錢煎湯送下食入不化腹脹便瀉不爽長夏濕著脾胃葷酒不忌氣分鬱滯據述嗔怒致此未必皆然茵陳草果木通腹皮飛滑石厚朴茯苓皮廣皮瘧愈食腥太早脾陽不司健運氣鬱不行為腫為脹宜忌食物中之黏膩者味者小溫中丸三錢十服痰飲喘咳水氣腫脹昔肥今瘦為痰病傷正氣不復下焦無力議治脾腎補骨脂茯苓廣皮生智仁生白朮川椒蒸餅為丸少陰氣逆議通太陽川桂枝五味白芍茯苓炙草淡乾薑少年背冷夜喘此為伏飲成哮痰飲屬陰邪乘夜陽不用事竊發以辛甘淡微通其陽桂枝炙草米仁茯苓薑皮飲酒便滑胸中氣逆陽不運行痰聚當以溫通其陽生智仁半夏乾薑茯苓廣皮薑汁飲酒聚濕濕生痰生熱維脈為濕熱所阻遂為痹痛猶是淺近之恙其在裡久釀痰飲深處絡中二年以來陽氣日衰痰濕皆屬陰濁乘夜沖舉有妨臥寢仲景論飲非一總以外飲治脾內飲治腎為要法總之脾陽鼓運水穀之氣何以化濕變痰腎陽潛藏斯水液無從上泛而為痰喘試以過飲必瀉甚酒肉當禁忌矣先議越婢法宣上鬱熱以通痰飲桂枝木木防己茯苓淡乾薑石膏白芍北五味脈沉背寒咳嗽吐稀涎夜不得臥此為伏飲遇冷即發小青龍湯去麻辛六旬又五從未生育先天坎陽未旺所賴後天水穀精華藉以形充氣沛男年八八天癸向衰形體似壯其氣已弱向來味厚溫補與體質相宜近因痰多火動藥力未能收納及下反為助痰妨胃之纍虛風暗旋原非客感冬藏未富春木蠢動風來肝腎陰陽不交使然木必凌土而納食不化陡然便溏矣再論痰飲莫詳仲景由水液上泛者治腎食減不運者治脾今肝木生風致麻痹漸軟亦當培土製木早服四斤丸夜服茯苓飲痰飲一症頭緒甚多以陽氣不足之體當此天暖發泄反誤服苦辛泄氣之藥傷及胃口此背冷不能納食是其明徵茯苓桂枝甘草生薑南棗痰飲皆陰濁乘陽微濁攻為嘔吐胃氣傷不主納食用真武湯驅濁飲醒陽真武湯脈濡中宮陽不主運濕濁聚痰不飢不渴不食桂枝木草果廣皮茯苓厚朴炒穀芽高年久不更衣痰氣上窒滾痰丸涎飲激射塊苓蘇子陳皮鬱金半夏芥子薑汁聚飲膈上辛開淡降而已塊苓桂枝炒熟半夏薑汁炒橘紅澤瀉蘇子冷哮氣喘急數年根深沉痼發時以開太陽逐飲平昔用腎氣丸加沉香幼年哮喘是寒暄失時食味不調致飲邪聚絡凡有內外感觸必喘逆氣填胸臆夜坐不得臥息晝日稍可展舒濁沫稀涎必變濃痰斯病勢自緩發於秋深冬月蓋飲為陰邪乘天氣下降地中之陽未生人身藏陽未旺所伏飲邪與外涼相召而竊發矣然伏於絡脈之中任行發散攻表滌痰逐里溫補與邪無干久藥不效謂此治法宜夏月陰氣在內時候艾灸肺俞等穴更安靜護養百日一交秋分暖護背部勿得懈弛病發之時暫用湯藥三四日即止平昔食物尤宜謹慎再經寒暑陶溶可冀宿患之安發時背冷氣寒宜用開太陽逐飲青龍法寒天痰嗽乃陽氣微弱不能護衛風冷來侵而起久則飲泛上逆入暮為劇飲屬陰濁耳仍發散清肺仿仲景飲門議治桂枝五味杏仁茯苓炙草乾薑附方橘半枳朮用竹瀝薑汁泛丸脈弦脊骨中冷深夜痰升欲坐少陰寒飲上泛議通太陽桂苓五味甘草湯加淡乾薑北細辛痰飲入夜上泛喘咳不得臥息當治飲不當治咳桂苓五味甘草湯加淡乾薑白芍寒熱客邪已過營衛變為痰飲遇冷遇暖或加勞悴飲泛阻塞升降喘不得著枕飲去便安逐飲非一最難除根小青龍去麻辛久遺下虛秋冬咳甚氣衝入夜上逆欲坐不能安枕形寒足冷顯然水泛為痰沫當從內飲門治醫用肺藥則謬矣桂苓五味甘草湯加白芍乾薑壯年久寓閩越粵南方陽氣偏泄中年以來內聚痰飲交冬背冷喘嗽必吐痰胃脘始爽今六十四歲已屬向衰喜暖怕寒陽虛已露不宜搜逐攻劫當養少陰腎藏仿前輩水泛化痰阻氣以致喘嗽之例腎氣去牛膝肉桂加沉香五味子年老水入湧出陽微伏飲大半夏湯加薑汁溫邪挾飲上逆肺胃不主宣降咳逆身熱胠脅痹而不舒素有肝邪升多降少以理氣泄飲為治旋覆花蔞仁霜橘紅杏仁冬瓜皮蘇子左癱經年形體已少蹺捷運動長夏氣交之濕與水穀不運之濕皆令阻遏脾胃流暢之氣食減不化大便不爽漸漸喘急四末肌理有中滿之纍杏仁腹皮厚朴米仁茯苓皮桔梗蔻仁廣皮煎藥送保和丸通泄肺氣喘緩腫減偏右則知內因水穀之濕全在氣分流通而解凡腥濁厚味皆滯氣留著與此病未合木防己苓皮萆薢桂枝米仁厚朴老年陽微氣窒浮腫當通腑陽勿進破氣生於術淡附子川桂枝厚朴白茯苓長夏濕邪傷太陰脾陽發瘡不盡其氣浮腫腹脹議宣通腑氣生白朮大腹皮厚朴生牡蠣茯苓皮澤瀉廣皮木防己診脈左沉右弦虛過勞陽傷清氣不主流行溫中丸不應非有形之滯以辛溫微通其陽桂枝韭白湯又案形盛氣衰是陽虛平素多飲酒有濕有痰其筋骨中漸漸畏寒刺痛卻主陽氣不流行矣同前方脾胃長齋數年脾胃日弱食進脘中少運小溲入暮漸多色萎黃脈弦虛皆中氣不足香砂異功散水泛為丸嘔瀉都令胃氣受傷凡不適意食物更能妨胃藥用和中謹慎口腹使脾胃氣壯不致反覆茯苓飲去元參金石斛湯泛丸形勞嗜飲中氣受傷涼藥治肺清痰降火不過見病治病急急理胃土以生金米仁白芨黃耆桔梗茯苓素嗜酸者中氣不利治以此法粗桂木炒陳皮焦白朮白豆蔻炙黑甘草舌白滑微嘔自利陽微虛餒急當溫里人參生於術炮薑炙草淡附子生益智接服生白朮人參茯苓生益智淡附子炒芍炮薑又服六君子湯丸方生於術人參木瓜茯苓生益智炮薑陳皮用煨薑南棗肉煎湯泛丸飢飽失節為內傷山嵐瘴癘是外因六腑陽氣不通滯濁蘊蓄不清經年不愈非湯藥所宜生茅朮草果仁厚朴制軍廣皮薄桂心水泛為丸脈左小澀右弦六旬有六陽微肢冷脘痞不易運化大便三四日一更衣初結後溏此太陰脾陽受困當用溫中醒陽理中加桂湯溫伏皆令脾胃受傷寒熱隨利黃水小便短赤熱自濕中而出痛擾虛里右脅食入不運仍是脾胃不和升降失司以溫胃宣通治生於術生智仁新會皮茯苓紫厚朴生薑渣平昔飲酒脾陽受傷聚濕食少不化大便久溏晡食不安飲水多溲溺愈少宜溫中佐運厚味酒醴須忌生於術牡蠣附子澤瀉飢飽寒熱用力都傷營衛內應脾胃故痿黃無力食入䐜脹溏泄平胃加炒黑川椒草果茹素多年中焦陽氣易虧納食必胸脘痛及兩脅由乎脾臟陽弱不主運行矣治以辛香溫暖健脾佐運於朮蓽撥淡乾薑新會皮益智仁淡吳萸夏秋濕勝滯脾食物不為運行陽不流行濕滯久而壅熱此中氣更困以和胃健脾分利水道逐濕生白朮草果仁木通茵陳澤瀉厚朴茯苓皮新會皮酒勝於谷致形畏寒嗽不止咳甚嘔吐乃胃陽受傷此治嗽清寒難用茯苓半曲煨薑米仁新會皮南棗胃陽不旺晚暮腹鳴痞脹晨起瘕泄兩方用胃苓治中相安今吐沫上湧仍屬胃病人參生於術茯苓益智附子乾薑各為末水泛丸凡滋味食下不安噯出臭濁不變蓋在地之物假粱肉成形者皆陰類也宜食飛翔之鳥以無油膘滯膩藥用妙香散芳香醒脾不致燥烈傷腎人參茯苓石菖蒲益智茯神炙甘草檀香或用木香新會皮奔馳勞動搖精精腐溺濁繼出血筋真陰大泄於下胸膈痞悶不飢不食腹內響動攻觸清陽結閉於上由醫者不察陰陽虛實反以清降滋陰傷及胃中之陽人參穀芽生益智石菖蒲茯苓廣木香茯神石斛檀香末廣皮服十劑後轉斑龍丸食入脘脹且痛是胃陽受傷凡冷濁肥膩須戒藿香草果茵陳廣皮厚朴茯苓皮向系積勞傷陽肝風內動症如類中專以溫腎補脾運痰熄風得效丁巳春深診脈不附骨而洞泄迄今形瘦未復頻年久瀉法宗瀉久傷腎以固攝下焦定議六君子湯仍宜暮服勿間以胃氣弱陽微嘔酸吳萸乾薑葫蘆巴茯苓蓽撥南棗食入噁心痞脹先曾腹痛瀉下外因口鼻受邪宜正氣平胃辛香久則脾胃陽傷溫中宜佐宣通可使病愈附子廣皮茯苓草果厚朴煨木香胃口弱極肛墜如欲頻便夫腎為胃關皆腎虛不司收納元海氣逆水化痰飲矣早上用八味丸減桂加五味子以收腎氣散越午後服異功散健中安胃都氣丸四服脘脅腹中諸痛飢飽悲哀內傷情志痛無定所忽閉忽開主乎營衛流行失緒凡心主營肺主衛當開爽怡悅氣血不致結痹不必偏於寒熱補瀉也桂枝石菖蒲遠志肉茯苓炙甘草茯神消渴心嘈心下痛氣塞自下而上咽中堵塞此厥陰肝陽升舉勞怒動陽必發久則反胃欲厥阿膠柏仁天冬小生地女貞子茯神脈左澀伏右弦嘔吐脘痛引及脅時痛甚則四肢冷麻是肝厥心痛驚起怫鬱致痛高良薑沙延胡吳萸青皮子生香附川楝子茯苓接服蘇合香丸真川椒烏梅肉泡湯化服接案脈伏者起似宜病減而痛脹脘痞口湧涎沫舌仍白鼻竅煤面欲赤頭汗顯然肝厥犯胃左升之氣逆亂攻絡脅胠乳穴皆脹辛香開氣不應便祕溺少用河間金鈴子散佐以潤液兩通氣血川楝子青橘葉左牡蠣延胡索炒桃仁漏蘆病久緒繁終不離乎厥陰一藏今商佐金氣以暗制之滋營氣以撫綏之實太陰以漸御之亦子貢存魯霸越滅吳之意人參制首烏茯神羚羊角阿膠麥冬補肝法人參茯神歸身炒白芍柏仁炙草又方人參茯神廣皮天麻蒸於朮炙草鉤藤附方戊己湯砂仁湯法丸丸方鹽水炒川連炒黑川椒生白朮青皮川楝子肉淡乾薑當歸身細辛脈沉小左弦沖氣至咽欲厥下墜入前陰溲溺不能自利此厥陰衝脈之病當以穢藥驅濁桂枝韭白茴香川楝茯苓皮青木香素有肝厥痛氣從脅腹厥逆至咽胸痛徹背且多痰飲舌苔常垢白病發不飢不食嘔酸症已數年痼疾難效人參炒焦白朮茯苓製半夏炙甘草陳皮炒焦當歸烏梅肉桂心炒川椒病從少腹右痛寒熱嘔吐是肝病傳胃病去不復寢食未如昔二氣不復總屬虛象議治厥陰陽明和陽益陰法小麥石決明阿膠南棗生地炙甘草連朝陰晦陽氣鬱勃食入運行失司氣滯為痛性更躁動本來乘土況有血症辛燥動絡非宜主兩和肝胃生白芍延胡索神麯炒枳實廣皮炒山查用甘藥嘔緩都因治嗽苦辛寒傷胃衝脈亦陽明胃經管轄此補胃以寧衝陽實具至理川桂枝炙甘草生黃耆生白芍南棗肉生牡蠣嘔吐苦水必在早晨蓋竟夜未進食物胃空則陽中濁壅攻胃胃底之水上溢此病已八年是食不謹慎胃陽受傷矣淡吳萸熟附子塊茯苓生白芍老人胃弱多食甜物緩中況入暴冷亦走胃之募原湯水盡嘔胃脘痛氣逆格拒以辛香開之吳萸高良薑紅豆蔻塊茯苓熟半夏研入蘇合丸寒自口鼻中入內發散疏表非法便燥不爽腑氣不和當先治痛理氣生香附汁草果仁杏仁高良薑廣皮厚朴丁巳風木不及春半陽未生旺議養陽方法人參熟於朮生智仁茯苓廣皮乾薑食入涎湧脘脅痛脹在右邊近日天冷更加前議胃陽已傷濁沫凝涎壅於胃脘致濁氣不降腸中為痹古稱九竅不和顯然腑病想暴寒口鼻吸入近日反痛為新寒凝沍之象蘇合香丸辛香頗通知邇日吸受寒威與久蓄凝涎互結以六日始更衣論無形與有形交混不獨輕劑理陽矣蓽撥半夏廣皮白良薑茯苓妙香丸五年來飢飽失和臍中胃脘啾唧痛痛甚嘔吐清水顯然中焦陽傷但久痛不已必致凝瘀沉錮自述泄氣則緩病痛之根在乎腑絡半夏厚朴草果薑汁廣皮葫蘆巴勞怒脘痛是肝木乘土屢經發作脘聚瘀痰上湧下泄瘀去始緩但痛發徒補則壅議冬月用通補方胃屬腑腑通為補製半夏廣皮桂木茯苓生於術石菖蒲牛肉膠為丸心下高脹至少腹其形橫梗大便不爽咽中痰阻從九竅不和屬胃虛小溫中丸十服食不得化是無陽也蓋胃陽受傷陰濁上僭為脹為嘔而酸水痰涎都因陰濁通陽為正治法人參半夏附子茯苓乾薑胃氣痛發五靈脂川楝子桂木生蒲黃元胡索生香附痛緩用後方炒桃仁茯神炒杞子柏子仁桂圓肉新絳丁巳風木司天春木氣震胃土受侮噯氣嘔食上年多以辛通得效陽氣因病致傷姑以小半夏湯和胃佐吳茱萸驅濁半夏茯苓乾薑吳茱萸四年臍左有形閃動發必堅大腰軟欲束縛不飢不欲食仿金匱桂薑苓朮湯轉旋下焦之陽始而嘈雜食進不化數年前脘中漸痛微嘔此乃積勞傷及營絡絡虛為補安間怡悅可以少發藥餌攻病未必去根炒桃仁桂枝木桂圓肉歸鬚炒延胡茯神病著右腹甚至針刺刀割牽引入於腰背必泄濁氣病緩自述服蚌灰小效復發夫蚌系介屬味鹹攻堅直入至陰之界是病已在陰絡錮結瘀滯蚌但鹹寒不能宣逐瘀腐絡病在下屬血緩攻為是蟅蟲炒桃仁酒大黃熬膏為丸麝香陰中之陽失護痛由前至肋引經必用厥陰陽明是謂知醫淡蓯蓉枸杞子茯苓沙苑蒺藜當歸生精羊肉陰氣混陽厥陰病難治吳茱萸川椒川楝子乾薑烏梅元胡背脊痛不耐坐左脅板實吸氣嗆痛左手冰冷食入不化常有遺精久病三年在絡議甘溫氣劑川桂枝木肉桂當歸茯苓左牡蠣炙甘草虛里穴為陽明胃陽明氣血皆多絡脈窒塞為痛映及背部脈絡不和必宣通望其痛息彼萸地之凝耆朮之守皆非絡藥桃仁穿山甲阿魏歸鬚韭白根麝香先有血淋淋止脅痛脈來左部堅搏是少陽鬱熱乘絡所致忌食酒肉厚味炒熟桃仁茺蔚子牡丹皮當歸鬚山梔澤蘭脈沉小痛起胸脘串及腰背五年宿恙寢食不改此病在脈腠之間痹阻不傷藏腑議以流通周行氣血勿得峻劑川桂枝撫芎乳香薑黃香附茯苓酒水各半泛丸絡氣不通嫩蘇梗黃麻骨塊茯苓煨葛根左脅下硬忽忽喜忘是為蓄血之象桃仁牡丹皮鬱金鉤藤降香汁赤芍藥橘紅氣痹噎膈關格厄逆中年以後陽氣已微午時噯氣食納上泛皆胃弱氣逆視面明脈弦必伏痰飲仲景胃虛客氣上逆例旋覆代赭湯氣鬱四年脘結自能排遣其結聚已散近日喉間吐咯不清食味甘必滯臟是肺胃不降以微辛微苦之屬久恙勿投峻劑枇杷葉米仁茯苓川貝母金石斛橘紅白蔻仁桔梗蜜丸喉旁左右有形咽物不礙但略起未食其形為虐思未食時胃中陽皆上蒸犯肺矣從前致病以火酒大辛熱結氣壅五年已為痼疾矣甜北沙參生黃耆麥冬甜秋梨金銀花熬膏服清肺胃化生津液玉女煎附方葦莖合葶藶大棗湯附方蘆根滑石浙苓生米仁川貝桑葉附方黃耆白芨桔梗黃精米仁百合聲嘶喉噎食不適即嘔逆嗆逆自述飲酒致傷首先犯肺開氣理逆清肅上焦鮮枇杷葉薏米仁射干活水蘆根浙苓降香汁脈症乃氣結在上津不運行蒸變濁痰由無形漸變有形徐之才謂輕可去實非膠固陰藥所宜鮮枇杷葉汁杏仁紫厚朴白蔻仁薏米仁降香汁脈小澀面赤目黃喉痛咽物不礙溺後淋濁此水穀之氣凝聚成濕鬱氣不升降三焦不利當以清肅上焦主治蘆根射干米仁白蔻浙苓通草昔年強旺夏秋熱病頓減精采不復鼻竅不通左脅有聲攻觸痛嘔遇勞即發必脈絡中瘀留凝聚頓然食減少飢大絡必聚血病中衄血已見一斑矣生蒲黃桃仁歸鬚五靈脂穿山甲桂枝木韭白汁泛為丸此跌撲致經脈氣血壅痹脅背高凸非湯藥可效黎洞丸每日服一丸脈虛浮沉取直上下行胃納素減病發從背徹心先脹悶幾日氣遂從下焦直衝至咽手足厥逆發厄細測病源屬胃虛相火直衝清道而上也夫衝脈並少陰之經行乎幽門通谷夾巨闕而上故丹溪謂厄逆屬於肝腎之虛者其氣必從臍下直衝上出於口斷續作聲右腎為相火所寓相火炎上挾其沖氣乃能逆上為厄主以大補陰丸折火滋水伏藏衝任治虛厄用參朮湯崇土以制龍雷之火也至東垣之論又云胃為衝脈所逆而反上行其症氣上衝咽不得息名曰厥逆宜調中益氣湯加吳茱萸觀厥氣多少而用之且隨四時寒熱溫涼而治若夏月有此症為大熱宜加連蘖知母直至下元以瀉衝脈之邪也兩條治法井井高出千古今擬大補陰丸早服調中益氣午服恪守勿懈自可除根遠勝後人龐雜之方矣大補陰丸調中益氣湯秋冬去連蘖知母黃蘖熟地人參柴胡木香吳茱萸黃柏知母元武白朮炙草陳皮黃連右少腹中衝氣上至胃口痛而嘔欲厄此陽微陰濁上踞老人有關格之纍炮黑附子淡吳茱萸生淡乾薑雄豬膽汁接案陰濁得辛熱反佐苦寒而降陽明之陽必傷然腑藥以通為補須忌食物厚味人參製附子茯苓淡乾薑形寒嘔逆瘕痛上衝噯食稍減人參半夏吳茱萸茯苓高良薑右脈如控弦北蘇子半夏代赭生枳實淡薑茯苓新會皮鬱金噁心飢不能食旋覆花人參雲苓金石斛代赭石半夏廣皮薑汁接服六君子去甘草加生薑煨益智仁附方枇杷葉金石斛竹瀝橘紅鮮蘆根薑汁後去竹瀝薑汁加杏仁紫苑老人脈右弦左澀因嗔怒致嘔吐䐜脹不納物此肝木犯胃湧逆不已必致濁阻上下不通老年復慮關格開口吳茱萸薑汁燉南棗肉搗丸服六七分日三服平昔嗜酒肺胃積熱陰液下枯陽津變痰鼻塞多嗆減食無味旬日更衣糞如羊屎老人關格治之極難況酒客不喜黏膩甘柔形脈症象不受溫熱議以鐵甕申先生瓊玉減蜜方法鮮生地人參水一盞煎至四分臨服加入沉香末琥珀末清陽不主轉旋強納不運吐出是不化之形腸汁乾涸腑陽不得傳導便難艱澀古稱關格為陰枯陽結藥難奏效或以半硫丸宣濁通腑仿戴元禮諸熱藥皆固祕惟硫黃滑而不祕半硫丸六旬外陽氣不旋反閉上不納食下不更衣此為關格脈小結澀傷於無形最為難治妙香丸每日三粒十服接案大凡噎格反胃老年閉於胃脘之上是清陽不主轉旋乃無形之結辛香通關反覺熱悶上升虛症無疑以大半夏湯合加黃連合瀉心法人參半夏茯苓川連竹瀝薑汁膻中為宗氣之海氣無沖和之力為噎為格皆能致之竟擬漸磨運蕩之法庶幾得之鬱金汁檀香汁川貝瓜蔞皮製半夏沉香汁枳實汁塊茯苓先吐汙濁繼而氣逆吐食平日腹痛今已便難瘀留在絡氣亂道路不通有形阻及無形議攻其瘀桃仁制軍去皮桂枝延胡生蒲黃炒煙盡五靈脂韭白汁臨服衝入三十匙凝瘀既久三焦道路為壅延成反胃噎膈議緩逐一法人參研桃仁去皮尖烘脆麝香研大黃蟅蟲酒浸新瓦上烘焙脆當歸梢烘煉蜜為丸經云食下不化是無陽也今早納晚吐仍然完穀胃陽衰憊困窮反胃湧吐陽氣結痹濁陰壅遏況少壯至中年操持縈思喜飲少谷陽氣積傷虞天民有云格拒反胃必陰枯陽結視面赤屬飲脈弦為痰飲留氣凝焉得不痛緩痛宜通然非攻下蕩滌之比當從通陽鎮逆為法真寒辛酸破泄真氣大傷胃陽不可再服仿仲景胃虛客氣上逆例人參淡附子淡乾薑代赭塊苓白旋覆花酒熱傷胃穀食入脘即噎湧出涎沫陽明脈不用事筋脈牽絆與半夏瀉心湯半夏茯苓金石斛竹瀝薑汁接服杏仁鮮枇杷葉厚朴茯苓半夏右脈弦長而數左脈帶澀阻在胃之上院起自恚怒不獨傷肝肺亦有之何也以其循胃上膈是肺之所屬金不及木得反侮之聚則氣凝痰阻眼胞足以證之擬泄金平木何如薑製枇杷葉蘇子水梨汁醋製代赭石桃仁茯苓薑汁鬱金滑石絳絹三四寸煎湯代水半硫通下頗效妙香開上反吐此中焦胃陽已虛也用大半夏湯食不得化是無陽也脈絡映痛辛香芳溫可效當用蘇合香丸昔年嗜飲濕聚痰壅致清升濁降痹阻食脘窄隘咽竅不納飲留氣凝治在上焦以飲有質氣無形也生滑石紫厚朴竹瀝沖蘆根瓜蔞皮薑汁沖老人噎膈不能納穀脘中窄隘是氣不通非有餘之比枇杷葉米仁橘紅蘆根茯苓薑汁途次吸入寒氣傷及絡脈每胸痛飲熱酒宣通小愈中年屢發陽氣受傷必有瘀聚漫延反胃噎膈宜薄味節勞薑汁茯苓炒桃仁桂枝木半夏胡索防方早服淡豆腐漿晚服枇杷葉膏噎膈為患脈微而遲乃胃之沖和之氣曲運神機所致也今已顆粒不食厄逆不止倉稟頓憊之象人參茯苓陳皮枳實生術炙甘草半夏磨沖紋銀汁和入服內經無火無水之論原非泛指張子和亦云湯中煮桂火里燒薑豈不讀耶蘆根生地塊苓米仁生術枇杷葉竹茹鬱金代赭石又接服六君子去甘草加枳實代赭薑棗黃米脈右弦面色赤亮納穀咽乾脘阻礙不下五十四歲清陽日薄致轉旋日鈍痰必阻氣結則脘窄不能宣通耳大便仍利但治脘膈之上白蔻仁杏仁厚朴桔梗枳實半夏半年脘悶多噯咳嗽此氣鬱不解納穀已減破泄耗氣非宜從胸痞治薤白湯
